<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner — RECKON 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Check Auth -->
    <script>
        fetch('/api/admin/check_auth')
            .then(res => {
                if (!res.ok) window.location.href = 'login.html';
            });
    </script>
    <!-- HTML5 QR Code Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan: #00fff7;
            --pink: #ff2d78;
            --dark: #060b18;
            --dim: rgba(255, 255, 255, .45);
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: rgba(255, 255, 255, .9);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ══ BG UPGRADES ══ */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: #00d4ff;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #ff2d78;
            top: 40%;
            left: 60%;
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 150px) scale(1.2);
            }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 40px 40px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 0) 80%);
        }

        /* ══ CONSTELLATION CANVAS ══ */
        #constellation {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: auto;
            opacity: 0.8;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4vw;
            height: 68px;
            background: rgba(6, 11, 24, .9);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(0, 212, 255, .1);
        }

        .nl-t1 {
            font-family: 'Orbitron', monospace;
            font-size: 15px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
        }

        .nl-t2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 9px;
            color: var(--pink);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .back-btn {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .65);
            text-decoration: none;
            padding: 9px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .04);
            transition: all .3s;
        }

        .wrap {
            width: 100%;
            max-width: 500px;
            margin-top: 100px;
            padding: 20px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .title {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            color: var(--cyan);
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            border: 2px solid rgba(0, 212, 255, 0.4);
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }

        .alert {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            display: none;
            transition: all 0.3s;
        }

        .alert.success {
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid rgba(0, 255, 102, 0.3);
            color: #00ff66;
        }

        .alert.error {
            background: rgba(255, 45, 120, 0.1);
            border: 1px solid rgba(255, 45, 120, 0.3);
            color: var(--pink);
        }

        button.hbtn-s {
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, .4);
            background: rgba(0, 212, 255, .1);
            cursor: pointer;
            transition: all .3s;
            margin-top: 20px;
        }

        button.hbtn-s:hover {
            background: rgba(0, 212, 255, .2);
            box-shadow: 0 0 15px rgba(0, 212, 255, .4);
        }

        button.hbtn-reset {
            background: rgba(255, 45, 120, 0.05);
            color: var(--pink);
            border: 1px solid rgba(255, 45, 120, 0.3);
            margin-top: 10px;
        }

        button.hbtn-reset:hover {
            background: rgba(255, 45, 120, 0.15);
            box-shadow: 0 0 15px rgba(255, 45, 120, 0.3);
            border-color: var(--pink);
        }

        /* ══ SCAN TYPE BUTTONS ══ */
        .scan-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .type-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .type-btn:hover {
            background: rgba(0, 212, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-2px);
        }

        .type-btn.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .type-btn.active::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 8px;
            color: var(--cyan);
            font-size: 12px;
            font-weight: 900;
        }

        .type-btn .icon {
            font-size: 22px;
        }

        .type-btn .label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dim);
        }

        .type-btn.active .label {
            color: #fff;
        }

        @media (max-width: 480px) {
            .wrap {
                margin-top: 80px;
                padding: 15px;
                width: 92%;
                max-width: 100%;
                box-shadow: none;
                border: none;
                background: transparent;
            }

            .title {
                font-size: 20px;
            }

            nav {
                padding: 0 15px;
            }
        }

        /* ══ SCAN EFFECTS ══ */
        .scan-flash {
            position: fixed;
            inset: 0;
            background: rgba(0, 255, 102, 0);
            z-index: 999;
            pointer-events: none;
            transition: background 0.1s ease-out;
        }

        .scan-flash.success {
            background: rgba(0, 255, 102, 0.4);
            animation: scifiFlash 0.5s ease-out;
        }

        .scan-flash.error {
            background: rgba(255, 45, 120, 0.4);
            animation: scifiFlash 0.5s ease-out;
        }

        @keyframes scifiFlash {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .team-profile-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUp 0.4s ease-out;
        }

        .team-profile-container img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            object-fit: cover;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.1); }
        }
    
    option { background: #060b18; color: #fff; }
</style>
</head>

<body>
    <div class="scan-flash" id="scanFlash"></div>

    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <div class="bg-grid"></div>
    </div>
    <canvas id="constellation"></canvas>

    <nav>
        <a style="text-decoration:none; display:flex; align-items:center; gap:10px;" href="admin.html">
            <div>
                <div class="nl-t1">RECKON 1.O</div>
                <div class="nl-t2">Check-in Scanner</div>
            </div>
        </a>
        <a class="back-btn" href="admin.html">&#8592; Dashboard</a>
    </nav>

    <div class="wrap">
        <div class="title">Scan Team QR</div>
        
        <style>
            .day-tabs {
                display: flex;
                gap: 10px;
                margin-bottom: 15px;
                justify-content: center;
            }
            .day-tab {
                padding: 8px 20px;
                border-radius: 20px;
                border: 1px solid var(--border);
                background: rgba(255,255,255,0.05);
                color: var(--dim);
                cursor: pointer;
                font-family: 'Orbitron';
                font-size: 11px;
                transition: 0.3s;
            }
            .day-tab.active {
                background: linear-gradient(135deg, var(--cyan), var(--purple));
                color: #fff;
                border-color: transparent;
                box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            }
            .scan-grid-container {
                display: none;
            }
            .scan-grid-container.active {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 25px;
            }
        </style>

        <div class="day-tabs">
            <div class="day-tab active" onclick="switchDay(1)">DAY 1 (APR 17)</div>
            <div class="day-tab" onclick="switchDay(2)">DAY 2 (APR 18)</div>
        </div>

        <div id="day1-grid" class="scan-grid-container active">
            <button class="type-btn active" data-type="morning" onclick="setType(this)">
                <span class="icon">☀️</span>
                <span class="label">Morning</span>
            </button>
            <button class="type-btn" data-type="lunch" onclick="setType(this)">
                <span class="icon">🥪</span>
                <span class="label">Lunch</span>
            </button>
            <button class="type-btn" data-type="snack" onclick="setType(this)">
                <span class="icon">🥤</span>
                <span class="label">Snack</span>
            </button>
            <button class="type-btn" data-type="dinner" onclick="setType(this)">
                <span class="icon">🍱</span>
                <span class="label">Dinner</span>
            </button>
        </div>

        <div id="day2-grid" class="scan-grid-container">
            <button class="type-btn" data-type="d2_morning" onclick="setType(this)">
                <span class="icon">☕</span>
                <span class="label">Morning</span>
            </button>
            <button class="type-btn" data-type="d2_lunch" onclick="setType(this)">
                <span class="icon">🍛</span>
                <span class="label">Lunch</span>
            </button>
            <button class="type-btn" data-type="d2_snack" onclick="setType(this)">
                <span class="icon">🍕</span>
                <span class="label">Snack</span>
            </button>
            <button class="type-btn" data-type="checkout" onclick="setType(this)">
                <span class="icon">🚪</span>
                <span class="label">Checkout</span>
            </button>
        </div>

        <div id="reader"></div>
        <button id="startBtn" class="hbtn-s" style="width:100%;" onclick="startScanner()">🚀 Start Digital
            Scanner</button>

        <div id="resultBox" class="alert"></div>
        <button id="resumeScan" class="hbtn-s" style="display:none;" onclick="resumeScanning()">Scan Next Team</button>

        <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
            <p
                style="font-size: 11px; color: var(--dim); margin-bottom: 10px; font-family: 'Rajdhani'; letter-spacing: 1px;">
                DEVELOPER TESTING TOOLS</p>
            <button class="hbtn-s hbtn-reset" onclick="resetAllCheckins()">Reset All Check-ins</button>
        </div>
    </div>

    <script>
        const resultBox = document.getElementById('resultBox');
        const resumeBtn = document.getElementById('resumeScan');
        const flashOverlay = document.getElementById('scanFlash');
        let html5QrCode = null;
        let isProcessing = false;
        let currentType = 'morning';

        function switchDay(day) {
            document.querySelectorAll('.day-tab').forEach((t, i) => {
                t.classList.toggle('active', i === day - 1);
            });
            document.querySelectorAll('.scan-grid-container').forEach((g, i) => {
                g.classList.toggle('active', i === day - 1);
            });
            
            // Set first button of the day as active
            const grid = document.getElementById(`day${day}-grid`);
            const firstBtn = grid.querySelector('.type-btn');
            if (firstBtn) setType(firstBtn);
        }

        function setType(btn) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.getAttribute('data-type');
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSciFiBeep('scan');
        }

        // ══ AUDIO SYNTHESIS ══
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSciFiBeep(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'scan') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
            else if (type === 'success') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);

                flashOverlay.className = 'scan-flash success';
                setTimeout(() => flashOverlay.className = 'scan-flash', 500);
            }
            else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);

                flashOverlay.className = 'scan-flash error';
                setTimeout(() => flashOverlay.className = 'scan-flash', 500);
            }
        }

        function startScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => initScanner()).catch(() => initScanner());
            } else {
                initScanner();
            }
        }

        function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.warn("Back camera failed, trying front:", err);
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccess, onScanFailure);
            });

            document.getElementById('startBtn').style.display = 'none';
        }

        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            playSciFiBeep('scan');

            // Normalize: trim whitespace, uppercase, and add REC1- prefix if missing
            let upperText = decodedText.toUpperCase().trim();

            // Validate: must be alphanumeric (with optional dashes)
            if (!/^[A-Z0-9][A-Z0-9\-]*$/.test(upperText)) {
                playSciFiBeep('error');
                showResult("error", "Invalid QR Code format. Not a RECKON team ID.");
                return;
            }

            // Ensure REC1- prefix is always present before sending to server
            if (!upperText.startsWith('REC1-')) {
                upperText = 'REC1-' + upperText;
            }

            isProcessing = true;
            html5QrCode.pause();

            fetch('/api/admin/checkin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ teamId: upperText, type: currentType })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        playSciFiBeep('success');
                        const details = data.team_details || {};
                        
                        // Personalized Greeting Mapping
                        const greetings = {
                            'morning': { msg: `Good Morning, <b>${data.team_name}</b>!`, quote: "Rise and shine! Let's build something epic today." },
                            'lunch': { msg: `Welcome to Lunch, <b>${data.team_name}</b>!`, quote: '"Eat well, Code well."' },
                            'snack': { msg: `Enjoy your Snack, <b>${data.team_name}</b>!`, quote: "Great minds need fuel. Take a well-deserved break!" },
                            'dinner': { msg: `Dinner Time, <b>${data.team_name}</b>!`, quote: "Keep the momentum going! You're doing legends' work." },
                            'd2_morning': { msg: `Happy Day 2, <b>${data.team_name}</b>!`, quote: "Final day! Make every line of code count." },
                            'd2_lunch': { msg: `Last Lunch, <b>${data.team_name}</b>!`, quote: "Almost there! The finish line is in sight." },
                            'd2_snack': { msg: `Last Push, <b>${data.team_name}</b>!`, quote: "You've got this! One final burst of creativity." },
                            'checkout': { msg: `Farewell, <b>${data.team_name}</b>!`, quote: "Thank you for being part of RECKON 1.O. See you at the prize ceremony!" }
                        };
                        
                        const greeting = greetings[currentType] || { msg: `Checked in, <b>${data.team_name}</b>!`, quote: "Success!" };

                        const membersHtml = (details.members || []).map(m => `
                            <div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
                                <img src="${m.avatar_url || 'https://ui-avatars.com/api/?name='+encodeURIComponent(m.name)}" 
                                     style="width:55px;height:55px; border-radius:50%; border:2px solid ${m.is_leader ? 'var(--pink)' : 'var(--cyan)'}; object-fit:cover; box-shadow: 0 0 10px rgba(0,212,255,0.2);">
                                <span style="font-size:11px; color:rgba(255,255,255,0.8); font-family:'Rajdhani'; font-weight:600;">${m.name.split(' ')[0]}</span>
                            </div>
                        `).join('');

                        showResult("success", `
                            <div style="text-align:center; animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                                <div style="display:inline-block; padding:5px 15px; border-radius:20px; background:rgba(0,255,102,0.1); border:1px solid rgba(0,255,102,0.3); color:#00ff66; font-family:'Orbitron'; font-size:12px; font-weight:700; margin-bottom:15px; letter-spacing:1px;">
                                    ✓ ${currentType.toUpperCase().replace('_', ' ')}
                                </div>
                                
                                <div style="font-size:24px; color:#fff; font-family:'Rajdhani'; font-weight:700; margin-bottom:10px; line-height:1.2;">
                                    ${greeting.msg}
                                </div>
                                
                                <div style="font-style:italic; font-size:15px; color:var(--cyan); margin-bottom:20px; font-family:'Exo 2'; opacity:0.9;">
                                    ${greeting.quote}
                                </div>

                                <div style="background:rgba(255,255,255,0.03); border-radius:12px; padding:15px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.05);">
                                    <div style="font-size:12px; color:var(--dim); margin-bottom:12px; font-family:'Rajdhani'; letter-spacing:1px; text-transform:uppercase;">Team Members</div>
                                    <div class="team-profile-container" style="display:flex; justify-content:center; gap:18px;">
                                        ${membersHtml}
                                    </div>
                                </div>

                                <div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px;">
                                    <div style="width:6px; height:6px; background:#00ff66; border-radius:50%; animation: pulse 1s infinite alternate;"></div>
                                    <small style="color:var(--dim); font-family:'Rajdhani'; text-transform:uppercase; letter-spacing:1px; font-size:10px;">Auto-resuming in 5s...</small>
                                </div>
                            </div>
                        `);
                        setTimeout(resumeScanning, 5000);
                    } else {
                        playSciFiBeep('error');
                        showResult("error", (data.error || "Failed to check in.") + "<br><small style='color:var(--dim)'>Auto-resuming in 3s...</small>");
                        setTimeout(resumeScanning, 3000);
                    }
                })
                .catch(err => {
                    playSciFiBeep('error');
                    showResult("error", "Network error. Check connection.<br><small style='color:var(--dim)'>Auto-resuming in 3s...</small>");
                    setTimeout(resumeScanning, 3000);
                });
        }

        function onScanFailure(error) { /* Background noise */ }

        function showResult(type, message) {
            resultBox.className = 'alert ' + type;
            resultBox.innerHTML = message;
            resultBox.style.display = 'block';
        }

        function resumeScanning() {
            isProcessing = false;
            resultBox.style.display = 'none';
            resumeBtn.style.display = 'none';
            html5QrCode.resume();
        }

        function resetAllCheckins() {
            if (!confirm("⚠️ DANGER: Reset ALL team check-in statuses?")) return;
            fetch('/api/admin/reset_checkins', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        playSciFiBeep('success');
                        alert("✅ Success: All records cleared.");
                    } else {
                        playSciFiBeep('error');
                        alert("❌ Error: " + (data.error || "Reset failed."));
                    }
                })
                .catch(err => {
                    playSciFiBeep('error');
                    alert("❌ Network Error: Could not reach the server.");
                });
        }

        // Constellation Background Animation
        (function () {
            var c = document.getElementById('constellation'), ctx = c.getContext('2d'), W, H, pts = [];
            function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
            resize(); window.addEventListener('resize', function () { resize(); init(); });
            function init() {
                pts = [];
                var density = (W < 768) ? 35000 : 18000;
                var n = Math.floor(W * H / density);
                for (var i = 0; i < n; i++) pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25, r: Math.random() * 1.5 + .5 });
            }
            init();

            var mx = W / 2, my = H / 2;
            c.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; });

            function draw() {
                if (document.visibilityState !== 'visible') {
                    requestAnimationFrame(draw);
                    return;
                }
                ctx.clearRect(0, 0, W, H);
                var threshold = (W < 768) ? 100 : 140;
                for (var i = 0; i < pts.length; i++) {
                    for (var j = i + 1; j < pts.length; j++) {
                        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
                        if (d < threshold) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(0,212,255,' + (0.15 * (1 - d / threshold)) + ')';
                            ctx.lineWidth = .6;
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.stroke();
                        }
                    }
                    var mdx = pts[i].x - mx, mdy = pts[i].y - my, md = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (md < 180) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(124,58,237,' + (0.3 * (1 - md / 180)) + ')';
                        ctx.moveTo(pts[i].x, pts[i].y);
                        ctx.lineTo(mx, my);
                        ctx.stroke();
                    }
                }
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,212,255,.7)';
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>
