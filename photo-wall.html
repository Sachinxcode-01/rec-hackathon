<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Photo Wall | RECKON 1.O</title>
    <meta name="description"
        content="Live photo wall — candid moments from RECKON 1.O Hackathon, shared in real-time by teams">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #060b18;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --cyan: #00d4ff;
            --purple: #7c3aed;
            --pink: #ff2d78;
            --dim: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* BG */
        .bg-orbs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: #00d4ff;
            bottom: -200px;
            right: -100px;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #ff2d78;
            top: 40%;
            left: 60%;
            opacity: 0.15;
            animation-delay: -12s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1)
            }

            100% {
                transform: translate(80px, 120px) scale(1.15)
            }
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(6, 11, 24, 0.88);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-nav {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: #fff;
            cursor: pointer;
            transition: all .3s;
        }

        .btn-nav:hover {
            background: rgba(0, 212, 255, 0.12);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.15);
        }

        .hbg {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            z-index: 1001;
        }

        .hbg span {
            width: 24px;
            height: 2px;
            background: var(--cyan);
            border-radius: 2px;
            transition: all .3s;
        }

        .mob {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(6, 11, 24, .98);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(0, 212, 255, .1);
            z-index: 1000;
            padding: 20px 4vw;
            flex-direction: column;
        }

        .mob.open {
            display: flex;
        }

        .mob a {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            transition: color .25s;
        }

        .mob a:hover, .mob a.active {
            color: var(--cyan);
        }

        @media (max-width: 1024px) {
            .nav-actions {
                display: none !important;
            }

            .hbg {
                display: flex;
            }
        }

        .hbg {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            z-index: 1001;
        }

        .hbg span {
            width: 24px;
            height: 2px;
            background: var(--cyan);
            border-radius: 2px;
            transition: all .3s;
        }

        .mob {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(6, 11, 24, .98);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(0, 212, 255, .1);
            z-index: 1000;
            padding: 20px 4vw;
            flex-direction: column;
        }

        .mob.open {
            display: flex;
        }

        .mob a {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            transition: color .25s;
        }

        .mob a:hover, .mob a.active {
            color: var(--cyan);
        }

        @media (max-width: 1024px) {
            .nav-actions {
                display: none !important;
            }

            .hbg {
                display: flex;
            }
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border: none;
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .3s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 30px rgba(0, 212, 255, 0.4);
        }

        /* LIVE BADGE */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(255, 45, 120, 0.12);
            border: 1px solid rgba(255, 45, 120, 0.35);
            color: var(--pink);
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 2px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--pink);
            border-radius: 50%;
            animation: pulse-live 1.4s ease infinite;
        }

        @keyframes pulse-live {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .4;
                transform: scale(1.5)
            }
        }

        /* MAIN */
        .main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 24px 80px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 40px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .page-header p {
            font-family: 'Rajdhani', sans-serif;
            color: var(--dim);
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* UPLOAD PANEL */
        .upload-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 50px;
            backdrop-filter: blur(12px);
        }

        .upload-panel h3 {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: var(--cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: stretch;
        }

        .upload-fields {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        @media(max-width:768px) {
            nav {
                padding: 0 16px;
                height: 64px;
            }

            .brand {
                font-size: 16px;
            }

            .brand img {
                height: 26px !important;
            }

            .nav-actions {
                gap: 8px;
            }

            .btn-nav {
                padding: 8px 12px;
                font-size: 9px;
                letter-spacing: 1px;
            }

            .live-badge {
                padding: 6px 10px;
                font-size: 9px;
            }

            .upload-grid {
                grid-template-columns: 1fr;
            }

            .page-header h1 {
                font-size: 26px;
            }

            .photo-wall {
                columns: 2 160px;
                column-gap: 12px;
            }

            .main {
                padding: 90px 16px 80px;
            }
        }

        @media(max-width:400px) {
            nav {
                padding: 0 12px;
            }

            .brand {
                font-size: 14px;
                gap: 6px;
            }

            .brand img {
                height: 24px !important;
            }

            .nav-actions {
                gap: 4px;
            }

            .btn-nav {
                padding: 6px 8px;
                font-size: 8px;
                letter-spacing: 0.5px;
            }

            .live-badge {
                padding: 4px 6px;
                font-size: 8px;
                gap: 4px;
            }

            .live-dot {
                width: 6px;
                height: 6px;
            }
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all .3s;
            background: rgba(0, 212, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover,
        .drop-zone.dragging {
            border-color: var(--cyan);
            background: rgba(0, 212, 255, 0.07);
        }

        .drop-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .drop-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .drop-text {
            color: var(--dim);
            font-size: 14px;
        }

        .drop-preview {
            max-height: 120px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            object-fit: cover;
            max-width: 100%;
        }

        input[type=text].field {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .3s;
        }

        input[type=text].field:focus {
            border-color: var(--cyan);
        }

        input[type=text].field::placeholder {
            color: var(--dim);
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-num {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--cyan);
        }

        .stat-label {
            color: var(--dim);
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
        }

        /* MASONRY GRID */
        .photo-wall {
            columns: 4 220px;
            column-gap: 16px;
        }

        .photo-card {
            break-inside: avoid;
            margin-bottom: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform .3s, box-shadow .3s, border-color .3s;
            animation: slideIn .5s ease both;
        }

        .photo-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(0, 212, 255, 0.35);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .photo-card img {
            width: 100%;
            display: block;
        }

        .photo-meta {
            padding: 12px 14px;
            background: linear-gradient(0deg, rgba(6, 11, 24, 0.95), rgba(6, 11, 24, 0.5));
        }

        .photo-team {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            color: var(--cyan);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .photo-caption {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.4;
        }

        .photo-time {
            font-size: 11px;
            color: var(--dim);
            margin-top: 4px;
        }

        /* NEW PHOTO BADGE */
        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--pink);
            color: #fff;
            font-family: 'Orbitron', monospace;
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 8px;
            letter-spacing: 1px;
            animation: fadeOut 4s 2s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1
            }

            100% {
                opacity: 0
            }
        }

        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox-inner {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
        }

        .lightbox-inner img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
        }

        .lightbox-info {
            margin-top: 16px;
            text-align: center;
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 24px;
            font-size: 32px;
            color: #fff;
            cursor: pointer;
            z-index: 10000;
            opacity: 0.7;
            transition: opacity .2s;
        }

        .lightbox-close:hover {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--dim);
        }

    option { background: #060b18; color: #fff; }

    /* ── REACTIONS ── */
    .photo-reactions {
        display: flex;
        gap: 6px;
        margin-top: 10px;
        flex-wrap: wrap;
    }
    .reaction-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--dim);
        font-family: 'Rajdhani', sans-serif;
    }
    .reaction-btn:hover {
        background: rgba(0, 212, 255, 0.1);
        border-color: var(--cyan);
        color: #fff;
        transform: scale(1.15) translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
    }
    .reaction-btn:active {
        transform: scale(0.9);
    }
    .reaction-count {
        font-family: 'Orbitron', monospace;
        font-size: 11px;
        font-weight: 600;
        color: var(--cyan);
    }
    .reaction-floating {
        position: absolute;
        pointer-events: none;
        animation: floatUpEmoji 1s forwards;
        z-index: 10;
        font-size: 24px;
    }
    @keyframes floatUpEmoji {
        0% { transform: translateY(0) scale(0.5); opacity: 1; }
        100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
    }
</style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav>
        <a href="index.html" class="brand">
            <img src="logo.jpg" style="height:30px;border-radius:50%;" alt="Logo"> RECKON 1.O
        </a>
        <div class="nav-actions">
            <div class="live-badge">
                <div class="live-dot"></div> LIVE
            </div>
            <a href="leaderboard.html" class="btn-nav">Leaderboard</a>
            <a href="index.html" class="btn-nav">Home</a>
        </div>
        <button class="hbg" id="hbg" aria-label="Menu"><span></span><span></span><span></span></button>
    </nav>

    <div class="mob" id="mob">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="schedule.html">Schedule</a>
        <a href="help.html">Help Hub</a>
        <a href="photo-wall.html" class="active">Photo Wall</a>
        <a href="team-login.html">Login</a>
    </div>

    <div class="main">
        <div class="page-header">
            <h1>📸 Photo Wall</h1>
            <p>Capture your hackathon moments — shared live with everyone</p>
        </div>

        <!-- UPLOAD PANEL -->
        <div class="upload-panel" id="uploadPanel">
            <h3>📤 Share a Photo</h3>
            <div class="upload-grid">
                <div>
                    <div class="drop-zone" id="dropZone" style="height: 100%;">
                        <input type="file" id="photoInput" accept="image/*">
                        <div class="drop-icon">🖼️</div>
                        <div class="drop-text">Drop image here or click to browse<br><small
                                style="font-size:11px;color:var(--dim);">JPEG/PNG, max 5MB</small></div>
                        <img id="dropPreview" class="drop-preview" alt="Preview">
                    </div>
                </div>
                <div class="upload-fields">
                    <div style="margin-bottom:12px;">
                        <label
                            style="font-size:12px;color:var(--dim);letter-spacing:1px;font-family:'Rajdhani',sans-serif;display:block;margin-bottom:6px;">TEAM
                            ID (Optional)</label>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="teamIdInput" class="field" placeholder="e.g. REC-123" maxlength="20"
                                style="flex:1;">
                            <button type="button" class="btn-primary" onclick="verifyTeamId()"
                                style="padding: 10px; font-size:12px; min-width:80px; width:auto;">Verify</button>
                        </div>
                    </div>
                    <div style="margin-bottom:12px;">
                        <label
                            style="font-size:12px;color:var(--dim);letter-spacing:1px;font-family:'Rajdhani',sans-serif;display:block;margin-bottom:6px;">TEAM
                            NAME</label>
                        <input type="text" id="teamNameInput" class="field" placeholder="Your team name" maxlength="60">
                    </div>
                    <div>
                        <label
                            style="font-size:12px;color:var(--dim);letter-spacing:1px;font-family:'Rajdhani',sans-serif;display:block;margin-bottom:6px;">CAPTION</label>
                        <input type="text" id="captionInput" class="field" placeholder="What's happening? (optional)"
                            maxlength="150">
                    </div>
                </div>
                <div style="margin-top: auto; display: flex; justify-content: flex-end;">
                    <button class="btn-primary" id="uploadBtn" onclick="uploadPhoto()"
                        style="width: auto; padding: 12px 24px;">
                        🚀 Share
                    </button>
                </div>
            </div>
        </div>
        <div id="uploadStatus" style="margin-top:14px;font-size:13px;color:var(--dim);"></div>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
        <div class="stat-chip">
            <div>
                <div class="stat-num" id="photoCount">—</div>
                <div class="stat-label">Photos Shared</div>
            </div>
        </div>
        <div class="stat-chip">
            <div>
                <div class="stat-num" id="teamCount">—</div>
                <div class="stat-label">Teams Participating</div>
            </div>
        </div>
    </div>

    <!-- PHOTO WALL -->
    <div class="photo-wall" id="photoWall">
        <div style="column-span:all;text-align:center;padding:80px;color:var(--dim);">Loading photos...</div>
    </div>
    </div>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">✕</span>
        <div class="lightbox-inner" onclick="event.stopPropagation()">
            <img id="lightboxImg" src="" alt="">
            <div class="lightbox-info">
                <div id="lightboxTeam"
                    style="font-family:'Orbitron',monospace;font-size:13px;color:var(--cyan);margin-bottom:6px;"></div>
                <div id="lightboxCaption" style="color:rgba(255,255,255,0.8);font-size:14px;"></div>
            </div>
        </div>
    </div>

    <script>
        // ── MOBILE MENU TOGGLE ──
        document.addEventListener('DOMContentLoaded', () => {
            const hbg = document.getElementById('hbg');
            const mob = document.getElementById('mob');
            if (hbg && mob) {
                hbg.addEventListener('click', () => {
                    mob.classList.toggle('open');
                });
                mob.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        mob.classList.remove('open');
                    });
                });
            }
        });

        // ── File selection / drop zone ──
        const photoInput = document.getElementById('photoInput');
        const dropZone = document.getElementById('dropZone');
        const dropPrev = document.getElementById('dropPreview');
        let selectedFile = null;

        photoInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) setFile(file);
        });
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault(); dropZone.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) setFile(file);
        });
        function setFile(file) {
            if (file.size > 5 * 1024 * 1024) { showStatus('File too large (max 5MB)', 'error'); return; }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => { dropPrev.src = e.target.result; dropPrev.style.display = 'block'; };
            reader.readAsDataURL(file);
        }

        function verifyTeamId() {
            const tId = document.getElementById('teamIdInput').value.trim();
            if (!tId) return;
            showStatus('Verifying Team...', 'success');
            fetch('/api/team/public/' + encodeURIComponent(tId))
                .then(r => r.json())
                .then(res => {
                    if (res.success && res.team_name) {
                        document.getElementById('teamNameInput').value = res.team_name;
                        showStatus('✅ Team verified!', 'success');
                    } else {
                        showStatus('❌ Team not found.', 'error');
                    }
                })
                .catch(() => showStatus('Error verifying team', 'error'));
        }

        // ── Upload ──
        function uploadPhoto() {
            if (!selectedFile) { showStatus('Please select a photo first.', 'error'); return; }
            const teamId = document.getElementById('teamIdInput').value.trim();
            const teamName = document.getElementById('teamNameInput').value.trim() || 'Anonymous';
            const caption = document.getElementById('captionInput').value.trim();
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true; btn.textContent = '⏳ Uploading…';

            const reader = new FileReader();
            reader.onload = e => {
                fetch('/api/photos/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ photo_data: e.target.result, team_id: teamId || undefined, team_name: teamName, caption })
                })
                    .then(r => r.json())
                    .then(res => {
                        btn.disabled = false; btn.textContent = '🚀 Share';
                        if (res.success) {
                            showStatus('🎉 Photo shared!', 'success');
                            selectedFile = null; dropPrev.style.display = 'none'; dropPrev.src = '';
                            document.getElementById('captionInput').value = '';
                            loadPhotos();
                        } else {
                            showStatus(res.error || 'Upload failed', 'error');
                        }
                    })
                    .catch(err => { btn.disabled = false; btn.textContent = '🚀 Share'; showStatus('Upload failed', 'error'); });
            };
            reader.readAsDataURL(selectedFile);
        }

        function showStatus(msg, type) {
            const el = document.getElementById('uploadStatus');
            el.textContent = msg;
            el.style.color = type === 'error' ? 'var(--pink)' : '#00ff64';
            setTimeout(() => { el.textContent = ''; }, 4000);
        }

        // ── Load Photos ──
        function timeAgo(iso) {
            const diff = (Date.now() - new Date(iso)) / 1000;
            if (diff < 60) return 'Just now';
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
            return `${Math.floor(diff / 86400)}d ago`;
        }

        let currentUser = { team_id: null, is_admin: false };

        async function checkAuth() {
            try {
                const r = await fetch('/api/auth/me');
                currentUser = await r.json();
            } catch(e) { console.error('Auth check failed', e); }
        }

        async function loadPhotos() {
            await checkAuth();
            fetch('/api/photos')
                .then(r => r.json())
                .then(photos => {
                    const wall = document.getElementById('photoWall');
                    document.getElementById('photoCount').textContent = photos.length;
                    const teams = new Set(photos.map(p => p.team_id || p.team_name));
                    document.getElementById('teamCount').textContent = teams.size;

                    if (photos.length === 0) {
                        wall.innerHTML = `<div class="empty-state" style="column-span:all;"><div class="empty-icon">📷</div><p>No photos yet. Be the first to share a moment!</p></div>`;
                        return;
                    }
                    wall.innerHTML = photos.map((p, i) => {
                        const isOwner = (currentUser.team_id && p.team_id === currentUser.team_id) || currentUser.is_admin;
                        let reactions = {};
                        try { reactions = JSON.parse(p.reactions || '{}'); } catch(e) {}
                        
                        const emojiSet = ['❤️', '🔥', '🚀', '✨', '💯'];
                        
                        return `
                        <div class="photo-card" id="photo-${p.id}" style="animation-delay:${Math.min(i, 20) * 0.05}s">
                            <img src="${p.photo_data}" alt="${escHtml(p.caption || 'Team photo')}" loading="lazy" onclick="openLightbox('${p.id}','${escHtml(p.photo_data)}','${escHtml(p.team_name)}','${escHtml(p.caption || '')}', ${isOwner})">
                            <div class="photo-meta">
                                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                    <div class="photo-team">${escHtml(p.team_name || 'Anonymous')}</div>
                                    ${isOwner ? `<button onclick="deletePhoto(${p.id}, ${currentUser.is_admin})" style="background:rgba(255,45,120,0.1); border:1px solid rgba(255,45,120,0.3); color:#ff2d78; font-size:9px; padding:2px 6px; border-radius:4px; cursor:pointer; font-family:'Orbitron',sans-serif;">DEL</button>` : ''}
                                </div>
                                ${p.caption ? `<div class="photo-caption">${escHtml(p.caption)}</div>` : ''}
                                
                                <div class="photo-reactions">
                                    ${emojiSet.map(emoji => `
                                        <button class="reaction-btn" onclick="reactToPhoto(${p.id}, '${emoji}')">
                                            <span>${emoji}</span>
                                            <span class="reaction-count" id="react-${p.id}-${emoji}">${reactions[emoji] || 0}</span>
                                        </button>
                                    `).join('')}
                                </div>

                                <div class="photo-time">${timeAgo(p.created_at)}</div>
                            </div>
                        </div>`;
                    }).join('');
                })
                .catch(e => console.error('Photo load error', e));
        }

        async function deletePhoto(id, isAdmin) {
            if (!confirm('Are you sure you want to delete this photo?')) return;
            const url = isAdmin ? `/api/admin/photos/${id}` : `/api/team/photos/${id}`;
            try {
                const r = await fetch(url, { method: 'DELETE' });
                const res = await r.json();
                if (res.success) {
                    showStatus('Deleted successfully', 'success');
                    loadPhotos();
                } else {
                    alert(res.error || 'Delete failed');
                }
            } catch(e) { console.error('Delete error', e); }
        }

        function escHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ── Lightbox ──
        function openLightbox(id, src, team, caption, canDelete) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightboxTeam').textContent = team;
            document.getElementById('lightboxCaption').textContent = caption;
            
            // Optionally add a delete button in lightbox too
            const infoDiv = document.getElementById('lightboxInfo');
            if (canDelete) {
               // ... could add here ...
            }

            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

        document.addEventListener('DOMContentLoaded', loadPhotos);

        // ── Socket.IO realtime ──
        const socket = io();
        socket.on('new_photo', data => {
            // Add "NEW" badge to top card
            loadPhotos();
        });
        socket.on('photo_deleted', data => {
            loadPhotos();
        });

        // ── Auto-refresh every 60s ──
        setInterval(loadPhotos, 60000);

        function reactToPhoto(photoId, emoji) {
            // Local animation
            spawnFloatingEmoji(photoId, emoji);
            
            fetch(`/api/photos/${photoId}/react`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emoji: emoji })
            }).catch(err => console.error('Reaction failed', err));
        }

        function spawnFloatingEmoji(photoId, emoji) {
            const card = document.getElementById(`photo-${photoId}`);
            if (!card) return;
            const float = document.createElement('div');
            float.className = 'reaction-floating';
            float.textContent = emoji;
            float.style.left = Math.random() * 80 + 10 + '%';
            float.style.bottom = '20%';
            card.appendChild(float);
            setTimeout(() => float.remove(), 1000);
        }

        socket.on('photo_reaction', data => {
            const { photo_id, reactions } = data;
            for (const emoji in reactions) {
                const el = document.getElementById(`react-${photo_id}-${emoji}`);
                if (el) {
                    const current = parseInt(el.textContent);
                    if (reactions[emoji] > current) {
                        el.textContent = reactions[emoji];
                        el.style.transform = 'scale(1.4)';
                        el.style.color = 'var(--pink)';
                        setTimeout(() => {
                            el.style.transform = '';
                            el.style.color = '';
                        }, 300);
                    }
                }
            }
        });
    </script>
</body>

</html>
