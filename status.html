<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Support Tracker — RECKON 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --pink: #ff2d78;
            --dark: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 212, 255, 0.2);
        }

        body {
            background: var(--dark);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 50px 50px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }

        header {
            padding: 20px 4vw;
            background: rgba(6, 11, 24, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--cyan);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff66;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff66;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 4vw;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            color: var(--cyan);
            margin: 10px 0;
        }

        .stat-lbl {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
        }

        .table-container {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rajdhani', sans-serif;
        }

        th {
            background: rgba(0, 212, 255, 0.05);
            text-align: left;
            padding: 15px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cyan);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-chip {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-pending { background: rgba(255, 45, 120, 0.1); color: var(--pink); border: 1px solid var(--pink); }
        .status-resolving { background: rgba(0, 212, 255, 0.1); color: var(--cyan); border: 1px solid var(--cyan); }
        .status-resolved { background: rgba(0, 255, 102, 0.1); color: #00ff66; border: 1px solid #00ff66; }

        .emergency-row {
            background: rgba(255, 45, 120, 0.05) !important;
        }

        .emergency-row td {
            color: var(--pink);
            font-weight: 700;
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .status-grid { grid-template-columns: 1fr; }
            th:nth-child(4), td:nth-child(4) { display: none; }
            th:nth-child(5), td:nth-child(5) { display: none; }
        }
    
    option { background: #060b18; color: #fff; }
</style>
</head>

<body>
    <div class="bg-container">
        <div class="bg-grid"></div>
    </div>

    <header>
        <a href="/" class="brand">
            RECKON 1.O
        </a>
        <div class="live-indicator">
            <div class="pulse-dot"></div>
            Live Support Stream
        </div>
    </header>

    <main>
        <div class="status-grid">
            <div class="stat-card">
                <div class="stat-lbl">Active Requests</div>
                <div class="stat-val" id="activeCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-lbl">Mentors Online</div>
                <div class="stat-val" id="mentorsCount">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-lbl">Avg Response</div>
                <div class="stat-val" id="avgTime">5m</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Team</th>
                        <th>Topic</th>
                        <th>Status</th>
                        <th>Mentor</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="statusBody">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>

        <div class="footer-note">
            REAL-TIME DATA UPLINK STABLE // SYSTEM VERSION 1.4.2
        </div>
    </main>

    <script>
        const socket = io();

        async function fetchStatus() {
            try {
                const res = await fetch('/api/help/status');
                const data = await res.json();
                renderTable(data);
                updateStats(data);
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        async function fetchMentorStats() {
            try {
                const res = await fetch('/api/help/stats');
                const data = await res.json();
                document.getElementById('mentorsCount').textContent = data.mentorsOnline;
            } catch (e) {}
        }

        function renderTable(requests) {
            const body = document.getElementById('statusBody');
            body.innerHTML = '';
            
            requests.forEach(req => {
                const tr = document.createElement('tr');
                if (req.is_emergency) tr.className = 'emergency-row';
                
                const timeStr = new Date(req.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const mentor = req.suggested_mentor || 'Assigned soon';
                const statusClass = `status-${req.status.toLowerCase()}`;
                
                tr.innerHTML = `
                    <td style="font-weight: 700;">${req.team_name || 'Hacker Team'}</td>
                    <td>${req.topic}</td>
                    <td><span class="status-chip ${statusClass}">${req.status}</span></td>
                    <td>${mentor}</td>
                    <td style="color: rgba(255,255,255,0.4);">${timeStr}</td>
                `;
                body.appendChild(tr);
            });
        }

        function updateStats(data) {
            const active = data.filter(r => r.status !== 'Resolved').length;
            document.getElementById('activeCount').textContent = active;
        }

        // Realtime updates via Socket.IO
        socket.on('help_status_update', (update) => {
            console.log("Status update received:", update);
            fetchStatus();
        });

        socket.on('new_help_request', (req) => {
            console.log("New request received:", req);
            fetchStatus();
        });

        // Initialize
        fetchStatus();
        fetchMentorStats();
        setInterval(fetchStatus, 30000); // Fallback refresh
    </script>
</body>

</html>
