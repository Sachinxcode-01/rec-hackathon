<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mint Your Cyber Pass | REC 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --violet: #b44dff;
            --pink: #ff2d78;
            --dark: #060b18;
            --glass: rgba(255, 255, 255, .04);
            --border: rgba(0, 212, 255, .2);
            --text: rgba(255, 255, 255, .9);
            --dim: rgba(255, 255, 255, .45);
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* ══ BACKGROUND ══ */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: floatOrb 25s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--purple);
            top: -200px;
            left: -100px;
        }

        .orb-2 {
            width: 700px;
            height: 700px;
            background: var(--blue);
            bottom: -300px;
            right: -100px;
            animation-delay: -7s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(150px, 200px) scale(1.3);
            }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 50px 50px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }

        /* ══ PASS CONTAINER ══ */
        .pass-wrapper {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            cursor: pointer;
        }

        .cyber-pass {
            width: 380px;
            height: 560px;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(25px);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 212, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Holographic Shine Effect */
        .shine {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.08) 50%, transparent 60%);
            background-size: 200% 200%;
            pointer-events: none;
            z-index: 2;
        }

        /* Header */
        .pass-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-ring {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            box-shadow: 0 0 15px var(--cyan);
        }

        .logo-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .hack-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
        }

        .pass-type {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            color: var(--pink);
            background: rgba(255, 45, 120, 0.1);
            padding: 4px 10px;
            border: 1px solid var(--pink);
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Body */
        .pass-body {
            flex: 1;
            margin: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .p-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--dim);
            margin-bottom: 5px;
        }

        .p-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .team-id-box {
            background: rgba(0, 212, 255, 0.05);
            border: 1px dashed var(--cyan);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .team-id-box .p-value {
            font-size: 32px;
            color: var(--cyan);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* Footer */
        .pass-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .security-stamp {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10px;
            color: var(--dim);
            max-width: 150px;
            line-height: 1.4;
        }

        .verified-badge {
            width: 60px;
            height: 60px;
            opacity: 0.6;
        }

        /* Overlay Details */
        .circuit-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: -1;
        }

        /* ══ UI CONTROLS ══ */
        .controls {
            margin-top: 50px;
            display: flex;
            gap: 20px;
            z-index: 20;
        }

        .mint-btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.3);
        }

        .mint-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.5);
        }

        .back-btn {
            padding: 16px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--dim);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Success Message */
        #success-notif {
            position: fixed;
            top: 30px;
            background: rgba(0, 255, 102, 0.15);
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 15px 30px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transform: translateY(-100px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #success-notif.show {
            transform: translateY(0);
        }

        @media (max-width: 500px) {
            .cyber-pass {
                width: 320px;
                height: 480px;
                padding: 30px;
            }

            .p-value {
                font-size: 18px;
            }

            .team-id-box .p-value {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <div id="success-notif">CYBER PASS GENERATED SUCCESSFULLY</div>

    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-grid"></div>
    </div>

    <div class="pass-wrapper" id="capture">
        <div class="cyber-pass" id="tilt-box">
            <div class="shine" id="shine"></div>
            <div class="circuit-bg"></div>

            <div class="pass-header">
                <div class="logo-area">
                    <div class="logo-ring">
                        <img src="logo.jpg" alt="REC Logo">
                    </div>
                    <div>
                        <div class="hack-name">REC 1.O</div>
                        <div style="font-size: 8px; color: var(--dim); letter-spacing: 1px;">NATIONAL LEVEL HACKATHON
                        </div>
                    </div>
                </div>
                <div class="pass-type">PARTICIPANT</div>
            </div>

            <div class="pass-body">
                <div>
                    <div class="p-label">Identity</div>
                    <div class="p-value" id="disp-team">TEAM ALPHA</div>
                </div>

                <div class="team-id-box">
                    <div class="p-label" style="color: var(--cyan)">Digital Identifier</div>
                    <div class="p-value" id="disp-id">REC-2026-####</div>
                </div>

                <div>
                    <div class="p-label">Domain Allocation</div>
                    <div class="p-value" style="font-size: 16px;">AI & CYBER INNOVATION</div>
                </div>
            </div>

            <div class="pass-footer">
                <div class="security-stamp">
                    AUTHENTICATED VIA<br>
                    <strong>SECURE-HACK PROTOCOL</strong><br>
                    VERIFIED ENTRANT 2026
                </div>
                <svg class="verified-badge" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="var(--cyan)" stroke-width="1"
                        stroke-dasharray="5,5" />
                    <path d="M30 50 L45 65 L70 35" fill="none" stroke="var(--cyan)" stroke-width="5" />
                </svg>
            </div>
        </div>
    </div>

    <div class="controls">
        <a href="team-dashboard.html" class="back-btn">← DASHBOARD</a>
        <button class="mint-btn" onclick="downloadPass()">DOWNLOAD PASS</button>
    </div>

    <script>
        // ── 3D TILT EFFECT ──
        const wrapper = document.querySelector('.pass-wrapper');
        const shine = document.getElementById('shine');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const rotateX = (y - centerY) / 25;
            const rotateY = -(x - centerX) / 25;

            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            // Move shine
            const shineX = (x / window.innerWidth) * 100;
            const shineY = (y / window.innerHeight) * 100;
            shine.style.background = `radial-gradient(circle at ${shineX}% ${shineY}%, rgba(255,255,255,0.15) 0%, transparent 60%)`;
        });

        // Reset tilt on mouse out
        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = `rotateX(0) rotateY(0)`;
        });

        // ── FETCH TEAM DATA ──
        async function fetchTeamData() {
            try {
                const res = await fetch('/api/team/details');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('disp-team').textContent = data.team_name.toUpperCase();
                    document.getElementById('disp-id').textContent = `REC26-${data.team_id.toString().padStart(4, '0')}`;
                }
            } catch (err) {
                console.error("Failed to fetch team data", err);
            }
        }
        fetchTeamData();

        // ── DOWNLOAD PASS ──
        function downloadPass() {
            const btn = document.querySelector('.mint-btn');
            btn.textContent = "GENERATING...";
            btn.disabled = true;

            // Reset tilt for clean capture
            wrapper.style.transform = "none";
            shine.style.opacity = "0";

            html2canvas(document.querySelector("#capture"), {
                backgroundColor: "#030712",
                scale: 2, // Higher quality
                useCORS: true,
                logging: false,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `REC1.0-Pass-${document.getElementById('disp-team').textContent}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();

                btn.textContent = "DOWNLOAD PASS";
                btn.disabled = false;
                shine.style.opacity = "1";

                // Show Notif
                const notif = document.getElementById('success-notif');
                notif.classList.add('show');
                setTimeout(() => notif.classList.remove('show'), 3000);
            });
        }
    </script>
</body>

</html>
