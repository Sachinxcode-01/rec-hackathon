<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — RECKON 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --violet: #b44dff;
            --pink: #ff2d78;
            --dark: #060b18;
            --dim: rgba(255, 255, 255, .45);
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: rgba(255, 255, 255, .9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative
        }

        /* ══ BG UPGRADES ══ */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: #00d4ff;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: var(--purple);
            top: 40%;
            left: 60%;
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 150px) scale(1.2);
            }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 40px 40px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 0) 80%);
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
        }

        /* ══ CONSTELLATION CANVAS ══ */
        #constellation {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: auto;
            opacity: 0.8;
        }

        /* LOGIN BOX */
        .login-wrap {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, .02);
            border: 1px solid rgba(124, 58, 237, .3);
            border-radius: 16px;
            padding: 40px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 1;
            box-shadow: 0 0 50px rgba(124, 58, 237, .1)
        }

        .title {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            color: var(--violet);
            text-align: center;
            margin-bottom: 8px
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: var(--pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 32px
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 20px
        }

        .fl {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .55)
        }

        input {
            font-family: 'Exo 2', sans-serif;
            font-size: 15px;
            color: #fff;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 10px;
            padding: 14px;
            width: 100%;
            transition: all .3s;
            outline: none
        }

        input:focus {
            border-color: rgba(124, 58, 237, .5);
            background: rgba(124, 58, 237, .05);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, .1)
        }

        .submit-btn {
            width: 100%;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            padding: 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, #7c3aed, #ff2d78);
            border: none;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(124, 58, 237, .3);
            transition: all .3s;
            margin-top: 10px
        }

        .submit-btn:hover {
            box-shadow: 0 0 40px rgba(124, 58, 237, .5);
            transform: translateY(-2px)
        }

        .error {
            color: var(--pink);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none
        }

        .back-link {
            font-family: 'Rajdhani', sans-serif;
            color: rgba(255, 255, 255, .5);
            font-size: 13px;
            text-align: center;
            display: block;
            margin-top: 24px;
            text-decoration: none;
            transition: color .3s
        }

        .back-link:hover {
            color: var(--cyan)
        }

        /* CAPTCHA STYLES */
        .captcha-wrap {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        .captcha-input {
            flex: 1;
        }

        .captcha-box {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            height: 48px;
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .captcha-box:hover {
            border-color: var(--pink);
            background: rgba(124, 58, 237, 0.15);
        }

        .captcha-canvas {
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .captcha-refresh {
            position: absolute;
            right: 5px;
            top: 2px;
            font-size: 10px;
            color: var(--cyan);
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .login-wrap {
                width: 90%;
                padding: 25px 20px;
            }

            .title {
                font-size: 20px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 24px;
            }
        }
    
    option { background: #060b18; color: #fff; }
    .brand-logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    .brand-logo { width: 100px; height: 100px; border-radius: 50%; object-fit: contain; background: #fff; border: 2.5px solid var(--purple); box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); }
    .captcha-form-input { text-transform: uppercase; }
</style>
</head>

<body>
    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <div class="bg-grid"></div>
    </div>
    <canvas id="constellation"></canvas>

    <div class="login-wrap">
        <div class="brand-logo-wrap">
            <img src="images/rec.png" alt="RECKON Logo" class="brand-logo">
        </div>
        <div class="title">RECKON 1.O</div>
        <div class="subtitle">Secure Admin Access</div>

        <div class="error" id="errBox"></div>

        <!-- Admin Form -->
        <form id="adminForm">
            <div class="fg">
                <label class="fl" for="username">Admin Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="fg">
                <label class="fl" for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="fg">
                <label class="fl">Security Check</label>
                <div class="captcha-wrap">
                    <div class="captcha-input">
                        <input type="text" id="captchaInputAdmin" placeholder="Enter Code" required maxlength="5"
                            class="captcha-form-input">
                    </div>
                    <div class="captcha-box" onclick="refreshCaptcha()" title="Click to refresh">
                        <canvas id="captchaCanvasAdmin" class="captcha-canvas" width="120" height="48"></canvas>
                        <span class="captcha-refresh">↻</span>
                    </div>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="aBtn">Login to Dashboard</button>
        </form>

        <a href="index.html" class="back-link">&#8592; Back to Public Site</a>
    </div>

    <script>
        function showError(msg) {
            const box = document.getElementById('errBox');
            box.textContent = msg;
            box.style.display = 'block';
        }

        function hideError() {
            const box = document.getElementById('errBox');
            if (box) box.style.display = 'none';
        }

        async function refreshCaptcha() {
            try {
                const res = await fetch('/api/get_captcha');
                const data = await res.json();
                if (data.success) {
                    drawCaptcha(data.captcha, 'captchaCanvasAdmin');
                }
            } catch (err) {
                console.error('Captcha fetch fail:', err);
            }
        }

        function drawCaptcha(text, canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < 6; i++) {
                ctx.strokeStyle = `rgba(124, 58, 237, ${Math.random() * 0.2 + 0.1})`;
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }
            ctx.font = 'italic bold 22px Orbitron';
            ctx.fillStyle = '#b44dff';
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            const chars = text.split('');
            const spacing = canvas.width / (chars.length + 1);
            chars.forEach((c, i) => {
                ctx.save();
                ctx.translate((i + 1) * spacing, canvas.height / 2);
                ctx.rotate((Math.random() - 0.5) * 0.4);
                ctx.fillText(c, 0, 0);
                ctx.restore();
            });
            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.3})`;
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('load', () => {
            refreshCaptcha();
        });

        // Admin Login Submit
        document.getElementById('adminForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const captcha = document.getElementById('captchaInputAdmin').value.trim().toUpperCase();
            const btn = document.getElementById('aBtn');

            if (!captcha) { showError('Please enter security captcha'); return; }

            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            fetch('/api/admin/login', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p, captcha: captcha })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const params = new URLSearchParams(window.location.search);
                        const next = params.get('next') || 'admin.html';
                        window.location.href = next;
                    } else {
                        showError(data.error || 'Invalid Admin Credentials or CAPTCHA!');
                        refreshCaptcha();
                        if (document.getElementById('captchaInputAdmin')) document.getElementById('captchaInputAdmin').value = '';
                        btn.textContent = 'Login to Dashboard';
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    showError('Network error. Try again.');
                    btn.textContent = 'Login to Dashboard';
                    btn.disabled = false;
                });
        });

        (function () {
            var c = document.getElementById('constellation'), ctx = c.getContext('2d'), W, H, pts = [];
            function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
            resize(); window.addEventListener('resize', function () { resize(); init(); });
            function init() {
                pts = [];
                var density = (W < 768) ? 35000 : 18000;
                var n = Math.floor(W * H / density);
                for (var i = 0; i < n; i++) pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25, r: Math.random() * 1.5 + .5 });
            }
            init();

            function draw() {
                if (document.visibilityState !== 'visible') {
                    requestAnimationFrame(draw);
                    return;
                }
                ctx.clearRect(0, 0, W, H);
                var threshold = (W < 768) ? 100 : 140;
                for (var i = 0; i < pts.length; i++) {
                    for (var j = i + 1; j < pts.length; j++) {
                        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
                        if (d < threshold) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(124,58,237,' + (0.15 * (1 - d / threshold)) + ')';
                            ctx.lineWidth = .6;
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.stroke();
                        }
                    }
                }
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(124,58,237,.7)';
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>

</html>
