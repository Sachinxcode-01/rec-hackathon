<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Portal — RECKON 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --violet: #b44dff;
            --pink: #ff2d78;
            --dark: #060b18;
            --glass: rgba(255, 255, 255, .04);
            --border: rgba(0, 212, 255, .15);
            --text: rgba(255, 255, 255, .9);
            --dim: rgba(255, 255, 255, .45);
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(150px, 100px) scale(1.3);
            }
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 68px;
            background: rgba(6, 11, 24, .9);
            -webkit-backdrop-filter: blur(22px);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(0, 212, 255, .1);
            display: flex;
            justify-content: center;
        }

        .nav-inner {
            width: 100%;
            max-width: 1000px;
            padding: 0 4vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 15px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            color: var(--pink);
            text-decoration: none;
            font-family: 'Rajdhani';
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: 1px solid var(--pink);
            padding: 5px 12px;
            border-radius: 4px;
            background: transparent;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--pink);
            color: #fff;
            box-shadow: 0 0 15px var(--pink);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 100px auto 40px;
            padding: 0 4vw;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(24px, 5vw, 42px);
            color: var(--cyan);
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
            margin-bottom: 5px;
        }

        .auth-card {
            max-width: 400px;
            margin: 40px auto;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 35px;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .form-title {
            font-family: 'Orbitron';
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
            color: var(--pink);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-family: 'Exo 2';
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--cyan);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn.primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        /* SCORING LIST */
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .team-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .team-card:hover {
            border-color: var(--cyan);
            background: rgba(255, 255, 255, 0.06);
        }

        .t-info h3 {
            font-family: 'Orbitron';
            font-size: 18px;
            color: #fff;
            margin-bottom: 4px;
        }

        .t-info p {
            font-size: 13px;
            color: var(--dim);
        }

        .rubric {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .rubric {
                grid-template-columns: repeat(2, 1fr);
            }
            .nav-inner {
                padding: 0 15px;
            }
            .container {
                padding: 0 15px;
                margin-top: 80px;
            }
            .header h1 {
                font-size: 24px;
            }
            .team-card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .t-info {
                margin-bottom: 15px;
            }
            .logout-btn {
                font-size: 10px;
                padding: 4px 10px;
            }
        }

        .rubric-item {
            text-align: center;
        }

        .rubric-item label {
            font-family: 'Rajdhani';
            font-size: 10px;
            color: var(--dim);
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .rubric-item select {
            padding: 5px;
            margin-bottom: 0;
            font-size: 12px;
        }

        .ai-suggest-btn {
            background: linear-gradient(135deg, var(--purple), var(--pink));
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            margin-bottom: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            font-family: 'Orbitron';
        }
        .ai-suggest-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--purple);
        }
        .ai-reasoning {
            background: rgba(124, 58, 237, 0.05);
            border: 1px solid rgba(124, 58, 237, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin: 15px 0;
            color: rgba(255,255,255,0.8);
            display: none;
            line-height: 1.5;
            border-left: 3px solid var(--purple);
        }
        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .score-btn {
            background: var(--blue);
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron';
            font-size: 11px;
            cursor: pointer;
        }

        .score-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            margin-top: 15px;
        }

        .score-btn {
            background: rgba(0, 255, 102, 0.1);
            color: #00ff66;
            border: 1px solid rgba(0, 255, 102, 0.3);
            padding: 8px;
            border-radius: 6px;
            font-family: 'Orbitron';
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
        }

        .score-btn:hover {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 15px #00ff66;
        }
    
    option { background: #060b18; color: #fff; }
    .brand-accent { color: var(--cyan); }
    #logoutBtn { display: none; }
    #authSection { display: none; }
    #portalSection { display: none; }
</style>
</head>

<body>
    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
    </div>

    <nav>
        <div class="nav-inner">
            <a href="index.html" class="brand">
                <span class="brand-accent">JUDGE</span> PORTAL
            </a>
            <button id="logoutBtn" class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- AUTH SECTION -->
    <div id="authSection" class="container">
        <div class="auth-card">
            <div class="form-title">Enter Access Key</div>
            <label for="j_user" style="display:none;">Judge ID</label>
            <input type="text" id="j_user" placeholder="Judge ID" aria-label="Judge ID">
            <label for="j_pass" style="display:none;">Authorization Code</label>
            <input type="password" id="j_pass" placeholder="Authorization Code" aria-label="Authorization Code">
            <button class="btn primary" onclick="login()">Authenticate</button>
        </div>
    </div>

    <!-- PORTAL SECTION -->
    <div id="portalSection" class="container">
        <div class="header">
            <h1>Official Scoring Sheet</h1>
            <p id="judgeGreeting">Welcome, Judge</p>
        </div>

        <div id="teamsList" class="portal-grid">
            <!-- Loaded -->
        </div>
    </div>

    <script>
        async function checkAuth() {
            const res = await fetch('/api/judge/check_auth');
            const data = await res.json();
            if (data.authenticated) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('portalSection').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                document.getElementById('judgeGreeting').innerText = "Logged in as Judge: @" + data.username;
                loadTeams();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('portalSection').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        }

        async function login() {
            const username = document.getElementById('j_user').value;
            const password = document.getElementById('j_pass').value;
            const res = await fetch('/api/judge/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) { checkAuth(); } else { alert('Invalid judge credentials'); }
        }

        async function logout() {
            await fetch('/api/judge/logout', { method: 'POST' });
            checkAuth();
        }

        async function loadTeams() {
            const res = await fetch('/api/projects'); // Use existing projects endpoint
            const teams = await res.json();
            const list = document.getElementById('teamsList');
            list.innerHTML = teams.map(t => `
                <div class="team-card">
                    <div style="width: 100%;">
                        <div class="t-info">
                            <h3>${t.team_name}</h3>
                            <p style="color: var(--cyan)">Project: ${t.project_title || 'Untitled'}</p>
                            <p>${t.project_desc || 'No description provided'}</p>
                        </div>
                        
                        <div class="rubric">
                            <div class="rubric-item">
                                <label>Innovation</label>
                                <select id="inn-${t.id}">
                                    ${[...Array(11).keys()].map(i => `<option value="${i}">${i}</option>`).join('')}
                                </select>
                            </div>
                            <div class="rubric-item">
                                <label>Impact</label>
                                <select id="imp-${t.id}">
                                    ${[...Array(11).keys()].map(i => `<option value="${i}">${i}</option>`).join('')}
                                </select>
                            </div>
                            <div class="rubric-item">
                                <label>Tech Dept</label>
                                <select id="tec-${t.id}">
                                    ${[...Array(11).keys()].map(i => `<option value="${i}">${i}</option>`).join('')}
                                </select>
                            </div>
                            <div class="rubric-item">
                                <label>UI/UX</label>
                                <select id="ui-${t.id}">
                                    ${[...Array(11).keys()].map(i => `<option value="${i}">${i}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div id="ai-reason-${t.id}" class="ai-reasoning"></div>

                        <div class="score-row">
                            <button class="ai-suggest-btn" id="ai-btn-${t.id}" onclick="aiReview('${t.id}')">
                                <span>✨ AI Review</span>
                            </button>
                            <button class="score-btn" onclick="submitScore('${t.id}')">Submit Final Evaluation</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function submitScore(teamId) {
            const data = {
                teamId: teamId,
                innovation: document.getElementById('inn-' + teamId).value,
                impact: document.getElementById('imp-' + teamId).value,
                tech: document.getElementById('tec-' + teamId).value,
                ui: document.getElementById('ui-' + teamId).value
            };

            try {
                const res = await fetch('/api/judge/score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('Scores recorded for Team ' + teamId);
                } else {
                    alert('Error submitting score');
                }
            } catch (e) { alert('Network error'); }
        }

        async function aiReview(teamId) {
            const btn = document.getElementById('ai-btn-' + teamId);
            const reasonBox = document.getElementById('ai-reason-' + teamId);
            const originalText = btn.innerHTML;
            
            btn.innerHTML = 'Analyzing...';
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/judge/ai-suggest/' + teamId);
                const data = await res.json();
                
                if (data.error) {
                    alert(data.error);
                } else {
                    // Fill scores
                    if (data.innovation !== undefined) document.getElementById('inn-' + teamId).value = Math.min(10, Math.round(data.innovation));
                    if (data.impact !== undefined) document.getElementById('imp-' + teamId).value = Math.min(10, Math.round(data.impact));
                    if (data.tech !== undefined) document.getElementById('tec-' + teamId).value = Math.min(10, Math.round(data.tech));
                    if (data.ui !== undefined) document.getElementById('ui-' + teamId).value = Math.min(10, Math.round(data.ui));
                    
                    // Show reasoning
                    reasonBox.innerHTML = `<strong>AI Insight:</strong> ${data.reasoning || data.explanation || 'No reasoning provided.'}`;
                    reasonBox.style.display = 'block';
                }
            } catch (e) {
                alert('Connection to AI Uplink failed');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        checkAuth();
    </script>
</body>

</html>
