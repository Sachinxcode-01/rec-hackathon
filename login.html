<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — REC 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --violet: #b44dff;
            --pink: #ff2d78;
            --dark: #060b18;
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: rgba(255, 255, 255, .9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative
        }

        /* ══ BG UPGRADES ══ */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: #00d4ff;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #ff2d78;
            top: 40%;
            left: 60%;
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 150px) scale(1.2);
            }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 40px 40px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 0) 80%);
        }

        /* ══ CONSTELLATION CANVAS ══ */
        #constellation {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: auto;
            opacity: 0.8;
        }

        /* LOGIN BOX */
        .login-wrap {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, .02);
            border: 1px solid rgba(0, 212, 255, .2);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(12px);
            position: relative;
            z-index: 1;
            box-shadow: 0 0 50px rgba(0, 212, 255, .1)
        }

        .title {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            color: var(--cyan);
            text-align: center;
            margin-bottom: 8px
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: var(--pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 32px
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 20px
        }

        .fl {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .55)
        }

        input {
            font-family: 'Exo 2', sans-serif;
            font-size: 15px;
            color: #fff;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 10px;
            padding: 14px;
            width: 100%;
            transition: all .3s;
            outline: none
        }

        input:focus {
            border-color: rgba(0, 212, 255, .5);
            background: rgba(0, 212, 255, .05);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, .1)
        }

        .submit-btn {
            width: 100%;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            padding: 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 212, 255, .3);
            transition: all .3s;
            margin-top: 10px
        }

        .submit-btn:hover {
            box-shadow: 0 0 40px rgba(0, 212, 255, .5);
            transform: translateY(-2px)
        }

        .error {
            color: var(--pink);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            display: none
        }

        .back-link {
            font-family: 'Rajdhani', sans-serif;
            color: rgba(255, 255, 255, .5);
            font-size: 13px;
            text-align: center;
            display: block;
            margin-top: 24px;
            text-decoration: none;
            transition: color .3s
        }

        .back-link:hover {
            color: var(--cyan)
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .09);
            color: rgba(255, 255, 255, .45);
            padding: 10px;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .3s;
        }

        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, .1);
        }

        .tab-btn.active {
            background: rgba(0, 212, 255, .15);
            color: var(--cyan);
            border-color: rgba(0, 212, 255, .4);
            box-shadow: 0 0 15px rgba(0, 212, 255, .2);
        }

        .admin-tab.active {
            background: rgba(124, 58, 237, .15);
            color: #b44dff;
            border-color: rgba(124, 58, 237, .4);
            box-shadow: 0 0 15px rgba(124, 58, 237, .2);
        }

        .admin-btn {
            background: linear-gradient(135deg, #7c3aed, #ff2d78);
            box-shadow: 0 0 20px rgba(124, 58, 237, .3);
        }

        .admin-btn:hover {
            box-shadow: 0 0 40px rgba(124, 58, 237, .5);
        }

        #qr-reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(0, 212, 255, .4);
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #qr-reader.scan-success {
            border-color: #00ff66 !important;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.6) !important;
        }

        #qr-reader.scan-error {
            border-color: #ff2d78 !important;
            box-shadow: 0 0 30px rgba(255, 45, 120, 0.6) !important;
        }

        #qr-reader__scan_region {
            background: transparent !important;
        }

        /* Full-screen Flash Overlay */
        #scan-flash {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            animation: flashAnim 0.6s ease forwards;
        }

        #scan-flash.green {
            background: rgba(0, 255, 102, 0.35);
        }

        #scan-flash.red {
            background: rgba(255, 45, 120, 0.4);
        }

        @keyframes flashAnim {
            0% {
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* Scan status badge inside the reader */
        #scan-status-badge {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            backdrop-filter: blur(4px);
            animation: badgePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        #scan-status-badge.ok {
            background: rgba(0, 255, 102, 0.25);
            border: 2px solid #00ff66;
            color: #00ff66;
            display: flex;
        }

        #scan-status-badge.err {
            background: rgba(255, 45, 120, 0.25);
            border: 2px solid #ff2d78;
            color: #ff2d78;
            display: flex;
        }

        @keyframes badgePop {
            from {
                transform: translate(-50%, -50%) scale(0.4);
                opacity: 0;
            }

            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        /* Scan corner guides */
        .scan-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--cyan);
            border-style: solid;
            z-index: 5;
        }

        .sc-tl {
            top: 10px;
            left: 10px;
            border-width: 2px 0 0 2px;
        }

        .sc-tr {
            top: 10px;
            right: 10px;
            border-width: 2px 2px 0 0;
        }

        .sc-bl {
            bottom: 10px;
            left: 10px;
            border-width: 0 0 2px 2px;
        }

        .sc-br {
            bottom: 10px;
            right: 10px;
            border-width: 0 2px 2px 0;
        }

        /* QR scan button with icon */
        .scan-qr-btn {
            width: 56px;
            flex-shrink: 0;
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 8px 4px;
            color: var(--cyan);
        }

        .scan-qr-btn:hover {
            background: rgba(0, 212, 255, 0.18);
            box-shadow: 0 0 16px rgba(0, 212, 255, 0.3);
        }

        .scan-qr-btn svg {
            width: 22px;
            height: 22px;
        }

        .scan-qr-btn span {
            font-size: 8px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            color: var(--cyan);
        }

        .otp-input-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .otp-box {
            font-size: 24px !important;
            text-align: center;
            letter-spacing: 4px;
            font-family: 'Orbitron', monospace !important;
            color: var(--cyan) !important;
        }

        @media (max-width: 480px) {
            .login-wrap {
                width: 90%;
                padding: 25px 20px;
            }

            .title {
                font-size: 20px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 24px;
            }
        }
    </style>
</head>

<body>

    <!-- Flash Overlay -->
    <div id="scan-flash"></div>

    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <div class="bg-grid"></div>
    </div>
    <canvas id="constellation"></canvas>

    <div class="login-wrap">
        <div class="title">REC 1.O</div>
        <div class="subtitle" id="subtitle">Participant Portal</div>

        <div class="tabs">
            <button class="tab-btn active" id="tabTeam" onclick="switchLogin('team')">Team</button>
            <button class="tab-btn admin-tab" id="tabAdmin" onclick="switchLogin('admin')">Admin</button>
        </div>

        <div class="error" id="errBox"></div>

        <!-- Team Form -->
        <form id="teamForm">
            <div id="idInputSection">
                <div class="fg">
                    <label class="fl">Team ID</label>
                    <input type="text" id="teamId" placeholder="e.g. REC1-A1B2C3" required>
                </div>

                <div id="qrScannerSection" style="display:none; margin-bottom:15px;">
                    <div id="qr-reader" style="position:relative;">
                        <!-- Corner guides -->
                        <div class="scan-corner sc-tl"></div>
                        <div class="scan-corner sc-tr"></div>
                        <div class="scan-corner sc-bl"></div>
                        <div class="scan-corner sc-br"></div>
                        <!-- Result badge -->
                        <div id="scan-status-badge"></div>
                    </div>
                </div>

                <div style="display:flex; gap:10px;">
                    <button type="submit" class="submit-btn" id="tBtn">Send Code</button>
                    <button type="button" class="scan-qr-btn" id="scanBtn" onclick="toggleScanner()"
                        title="Scan QR Code">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <path d="M14 14h2v2h-2zM16 16h2v2h-2zM14 18h2v2h-2zM18 14h2v2h-2zM18 18h2v2h-2z" />
                        </svg>
                        <span>SCAN</span>
                    </button>
                </div>
                <p
                    style="font-size:11px; color:var(--dim); text-align:center; margin-top:15px; font-family:'Rajdhani';">
                    A unique code will be sent to your team leader's email.
                </p>
            </div>

            <div id="otpSection" style="display:none;">
                <p id="otpHint"
                    style="font-size:13px; color:var(--cyan); text-align:center; margin-bottom:15px; font-family:'Rajdhani';">
                </p>
                <div class="fg">
                    <label class="fl">6-Digit Verification Code</label>
                    <input type="text" id="otpBox" class="otp-box" placeholder="······" maxlength="6" required>
                </div>
                <button type="button" class="submit-btn" onclick="verifyOTP()" id="vBtn">Verify & Login</button>
                <button type="button" class="back-link" onclick="resetLogin()"
                    style="background:none; border:none; width:100%; cursor:pointer;">&#8592; Change Team ID</button>
            </div>
        </form>

        <!-- Admin Form -->
        <form id="adminForm" style="display:none;">
            <div class="fg">
                <label class="fl">Admin Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="fg">
                <label class="fl">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="submit-btn admin-btn" id="aBtn">Login to Dashboard</button>
        </form>

        <a href="index.html" class="back-link">&#8592; Back to Public Site</a>
    </div>

    <script>
        function switchLogin(type) {
            document.getElementById('errBox').style.display = 'none';
            if (type === 'team') {
                document.getElementById('tabTeam').classList.add('active');
                document.getElementById('tabAdmin').classList.remove('active');
                document.getElementById('teamForm').style.display = 'block';
                document.getElementById('adminForm').style.display = 'none';
                document.getElementById('subtitle').textContent = 'Participant Portal';
            } else {
                document.getElementById('tabAdmin').classList.add('active');
                document.getElementById('tabTeam').classList.remove('active');
                document.getElementById('adminForm').style.display = 'block';
                document.getElementById('teamForm').style.display = 'none';
                document.getElementById('subtitle').textContent = 'Secure Admin Access';
            }
        }

        let scanner = null;
        let currentTeamId = null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(type) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            if (type === 'success') {
                o.frequency.setValueAtTime(880, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
                g.gain.setValueAtTime(0.3, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                o.start(); o.stop(audioCtx.currentTime + 0.35);
            } else {
                o.type = 'sawtooth';
                o.frequency.setValueAtTime(220, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
                g.gain.setValueAtTime(0.4, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                o.start(); o.stop(audioCtx.currentTime + 0.4);
            }
        }

        function triggerFlash(type) {
            const flash = document.getElementById('scan-flash');
            flash.className = type;
            flash.style.display = 'block';
            flash.style.animation = 'none';
            void flash.offsetWidth; // reflow
            flash.style.animation = 'flashAnim 0.6s ease forwards';
            setTimeout(() => { flash.style.display = 'none'; }, 650);
        }

        function triggerScanResult(type) {
            const reader = document.getElementById('qr-reader');
            const badge = document.getElementById('scan-status-badge');
            reader.classList.remove('scan-success', 'scan-error');
            badge.className = '';
            badge.style.display = 'none';
            if (type === 'success') {
                reader.classList.add('scan-success');
                badge.innerHTML = '✓';
                badge.classList.add('ok');
                triggerFlash('green');
                playBeep('success');
            } else {
                reader.classList.add('scan-error');
                badge.innerHTML = '✕';
                badge.classList.add('err');
                triggerFlash('red');
                playBeep('error');
            }
            setTimeout(() => {
                reader.classList.remove('scan-success', 'scan-error');
                badge.style.display = 'none';
                badge.className = '';
            }, 1200);
        }

        function toggleScanner() {
            const section = document.getElementById('qrScannerSection');
            if (section.style.display === 'none') {
                section.style.display = 'block';
                document.getElementById('scanBtn').style.background = 'rgba(0,212,255,0.25)';
                scanner = new Html5Qrcode("qr-reader");
                scanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 220, height: 220 } },
                    (decodedText) => {
                        document.getElementById('teamId').value = decodedText;
                        // Quick check if it looks like a valid REC1 ID
                        if (decodedText.startsWith('REC1-')) {
                            triggerScanResult('success');
                        } else {
                            triggerScanResult('error');
                        }
                        setTimeout(() => {
                            toggleScanner();
                            if (decodedText.startsWith('REC1-')) {
                                document.getElementById('teamForm').dispatchEvent(new Event('submit'));
                            }
                        }, 900);
                    },
                    (error) => { /* ignore scan frame errors */ }
                );
            } else {
                section.style.display = 'none';
                document.getElementById('scanBtn').style.background = 'rgba(0,212,255,0.08)';
                if (scanner) {
                    scanner.stop().then(() => scanner = null).catch(() => scanner = null);
                }
            }
        }

        function resetLogin() {
            document.getElementById('idInputSection').style.display = 'block';
            document.getElementById('otpSection').style.display = 'none';
            document.getElementById('errBox').style.display = 'none';
        }

        // Team Login Submit (Step 1: Request Code)
        document.getElementById('teamForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const tid = document.getElementById('teamId').value;
            const btn = document.getElementById('tBtn');

            btn.textContent = 'Identifying...';
            btn.disabled = true;

            fetch('/api/team/request_login_code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ teamId: tid })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        currentTeamId = tid;
                        document.getElementById('idInputSection').style.display = 'none';
                        document.getElementById('otpSection').style.display = 'block';
                        document.getElementById('otpHint').textContent = `Code sent to: ${data.email}`;
                        document.getElementById('errBox').style.display = 'none';
                    } else {
                        document.getElementById('errBox').textContent = data.error || 'Identity check failed!';
                        document.getElementById('errBox').style.display = 'block';
                    }
                    btn.textContent = 'Send Code';
                    btn.disabled = false;
                })
                .catch(err => {
                    document.getElementById('errBox').textContent = 'Network error.';
                    document.getElementById('errBox').style.display = 'block';
                    btn.textContent = 'Send Code';
                    btn.disabled = false;
                });
        });

        // Step 2: Verify OTP
        function verifyOTP() {
            const code = document.getElementById('otpBox').value;
            const btn = document.getElementById('vBtn');

            if (code.length !== 6) {
                alert('Please enter the 6-digit code.');
                return;
            }

            btn.textContent = 'Verifying...';
            btn.disabled = true;

            fetch('/api/team/verify_login_code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ teamId: currentTeamId, code: code })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = 'team-dashboard.html';
                    } else {
                        document.getElementById('errBox').textContent = data.error || 'Invalid code!';
                        document.getElementById('errBox').style.display = 'block';
                        btn.textContent = 'Verify & Login';
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    document.getElementById('errBox').textContent = 'Network error.';
                    document.getElementById('errBox').style.display = 'block';
                    btn.textContent = 'Verify & Login';
                    btn.disabled = false;
                });
        }

        // Admin Login Submit
        document.getElementById('adminForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('aBtn');

            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = 'admin.html';
                    } else {
                        document.getElementById('errBox').textContent = 'Invalid Admin Credentials!';
                        document.getElementById('errBox').style.display = 'block';
                        btn.textContent = 'Login to Dashboard';
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    document.getElementById('errBox').textContent = 'Network error.';
                    document.getElementById('errBox').style.display = 'block';
                    btn.textContent = 'Login to Dashboard';
                    btn.disabled = false;
                });
        });

        // Constellation Background Animation
        (function () {
            var c = document.getElementById('constellation'), ctx = c.getContext('2d'), W, H, pts = [];
            function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
            resize(); window.addEventListener('resize', function () { resize(); init(); });
            function init() {
                pts = [];
                var n = Math.floor(W * H / 18000);
                for (var i = 0; i < n; i++) pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25, r: Math.random() * 1.5 + .5 });
            }
            init();

            var mx = W / 2, my = H / 2;
            c.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; });

            function draw() {
                ctx.clearRect(0, 0, W, H);
                for (var i = 0; i < pts.length; i++) {
                    for (var j = i + 1; j < pts.length; j++) {
                        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 140) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(0,212,255,' + (0.15 * (1 - d / 140)) + ')';
                            ctx.lineWidth = .6;
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.stroke();
                        }
                    }
                    var mdx = pts[i].x - mx, mdy = pts[i].y - my, md = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (md < 180) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(124,58,237,' + (0.3 * (1 - md / 180)) + ')';
                        ctx.moveTo(pts[i].x, pts[i].y);
                        ctx.lineTo(mx, my);
                        ctx.stroke();
                    }
                }
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,212,255,.7)';
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>

</html>
