<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Gallery — REC 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --violet: #b44dff;
            --pink: #ff2d78;
            --dark: #060b18;
            --glass: rgba(255, 255, 255, .04);
            --border: rgba(0, 212, 255, .15);
            --text: rgba(255, 255, 255, .9);
            --dim: rgba(255, 255, 255, .45);
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ══ BG UPGRADES ══ */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: #00d4ff;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #ff2d78;
            top: 40%;
            left: 60%;
            animation-delay: -10s;
            opacity: 0.2;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 150px) scale(1.2);
            }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 40px 40px;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0, 0, 0, 1) 30%, rgba(0, 0, 0, 0) 80%);
        }

        /* ══ CONSTELLATION CANVAS ══ */
        #constellation {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: auto;
            opacity: 0.8;
        }

        /* ══ NAV ══ */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4vw;
            height: 68px;
            background: rgba(6, 11, 24, .9);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(0, 212, 255, .1);
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 15px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(0, 212, 255, .5);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 212, 255, .05);
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(0, 212, 255, .15);
            border-color: rgba(0, 212, 255, .4);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 212, 255, .2);
        }

        /* ══ MAIN HERO ══ */
        .gallery-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 110px auto 40px;
            padding: 0 4vw;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 900;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            margin-bottom: 10px;
        }

        @media(max-width: 768px) {
            .page-header h1 {
                font-size: 28px;
            }
        }

        .page-header p {
            font-family: 'Rajdhani', sans-serif;
            color: var(--dim);
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* ══ PROJECT GRID ══ */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0, 0, 0, .5);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, .6);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--blue), var(--pink));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .project-title {
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }

        .team-badge {
            font-family: 'Rajdhani', sans-serif;
            background: rgba(255, 45, 120, 0.1);
            color: var(--pink);
            border: 1px solid rgba(255, 45, 120, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            display: inline-block;
        }

        .project-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .tech-pill {
            background: rgba(0, 212, 255, 0.1);
            color: var(--cyan);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .project-links {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .social-link {
            color: var(--blue);
            text-decoration: none;
            font-family: 'Exo 2', sans-serif;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
        }

        .social-link:hover {
            color: #fff;
        }

        .upvote-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: var(--cyan);
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
        }

        .upvote-btn:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--cyan);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .upvote-btn.voted {
            background: var(--cyan);
            color: var(--navy);
            border-color: var(--cyan);
        }

        .loading-state {
            text-align: center;
            padding: 60px;
            color: var(--dim);
            grid-column: 1 / -1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.2);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-container">
        <div class="bg-grid"></div>
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>
    <canvas id="constellation"></canvas>

    <!-- Navigation -->
    <nav>
        <a href="index.html" class="brand">
            REC 1.O
        </a>
        <div class="nav-actions">
            <a href="index.html" class="btn">Back to Home</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="gallery-container">
        <div class="page-header">
            <h1>Project Gallery</h1>
            <p>Explore the brilliant innovations built by our hackers in just 24 hours.</p>
        </div>

        <div id="projectsGrid" class="projects-grid">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading amazing projects...</p>
            </div>
            <!-- Projects injected via JS -->
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Load Projects
        function loadProjects() {
            fetch('/api/projects')
                .then(r => r.json())
                .then(projects => {
                    const grid = document.getElementById('projectsGrid');
                    if (projects.length === 0) {
                        grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--dim);">No projects submitted yet. Check back later!</div>';
                        return;
                    }

                    grid.innerHTML = '';
                    projects.forEach(p => {
                        const techStackHTML = (p.tech_stack || "Hack").split(',').map(tech =>
                            `<span class="tech-pill">${tech.trim() || 'Awesome Tech'}</span>`
                        ).join('');

                        let githubHTML = '';
                        if (p.github_link) {
                            let url = p.github_link.startsWith('http') ? p.github_link : 'https://' + p.github_link;
                            githubHTML = `<a href="${url}" target="_blank" class="social-link" title="Source Code">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                                            GitHub
                                          </a>`;
                        }

                        let demoHTML = '';
                        if (p.demo_link) {
                            let url = p.demo_link.startsWith('http') ? p.demo_link : 'https://' + p.demo_link;
                            demoHTML = `<a href="${url}" target="_blank" class="social-link" title="Video Demo / Live Demo">
                                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                          Live Demo
                                        </a>`;
                        }

                        const card = document.createElement('div');
                        card.className = 'project-card';

                        let isVoted = localStorage.getItem('voted_' + p.id) === 'true';
                        let upvoteClass = isVoted ? 'voted' : '';
                        let upvoteIcon = isVoted ? '❤️' : '🤍';
                        let onclick = isVoted ? '' : `onclick="upvoteProject('${p.id}', this)"`;

                        card.innerHTML = `
                            <div class="project-header">
                                <div>
                                    <h3 class="project-title">${p.project_title || 'Untitled Project'}</h3>
                                    <div class="team-badge">Team: ${p.team_name}</div>
                                </div>
                            </div>
                            <div class="project-desc">${p.project_desc || 'No description provided.'}</div>
                            <div class="tech-stack">${techStackHTML}</div>
                            
                            <div style="flex-grow: 1;"></div>
                            
                            <div class="project-links">
                                ${githubHTML}
                                ${demoHTML}
                            </div>
                            
                            <button class="upvote-btn ${upvoteClass}" id="upvote-btn-${p.id}" ${onclick}>
                                <span class="icon">${upvoteIcon}</span>
                                <span class="count">${p.upvotes || 0}</span> Upvotes
                            </button>
                        `;
                        grid.appendChild(card);
                    });
                })
                .catch(e => {
                    console.error('Error fetching projects', e);
                    document.getElementById('projectsGrid').innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--pink);">Failed to load projects. Please try again.</div>';
                });
        }

        function upvoteProject(teamId, btnElement) {
            fetch(`/api/projects/${teamId}/upvote`, {
                method: 'POST'
            })
                .then(r => r.json())
                .then(res => {
                    if (res.success) {
                        localStorage.setItem('voted_' + teamId, 'true');
                        btnElement.classList.add('voted');
                        btnElement.removeAttribute('onclick');
                        const iconSpan = btnElement.querySelector('.icon');
                        iconSpan.textContent = '❤️';
                        const countSpan = btnElement.querySelector('.count');
                        countSpan.textContent = parseInt(countSpan.textContent) + 1;
                    }
                })
                .catch(e => console.error(e));
        }

        document.addEventListener('DOMContentLoaded', loadProjects);

        // ── CONSTELLATION BG ANIMATION ──
        (function () {
            var c = document.getElementById('constellation'), ctx = c.getContext('2d'), W, H, pts = [];
            function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
            resize(); window.addEventListener('resize', function () { resize(); init(); });
            function init() {
                pts = [];
                var n = Math.floor(W * H / 18000);
                for (var i = 0; i < n; i++) pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25, r: Math.random() * 1.5 + .5 });
            }
            init();

            var mx = W / 2, my = H / 2;
            c.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; });

            function draw() {
                ctx.clearRect(0, 0, W, H);
                for (var i = 0; i < pts.length; i++) {
                    for (var j = i + 1; j < pts.length; j++) {
                        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 140) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(0,212,255,' + (0.15 * (1 - d / 140)) + ')';
                            ctx.lineWidth = .6;
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.stroke();
                        }
                    }
                    var mdx = pts[i].x - mx, mdy = pts[i].y - my, md = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (md < 180) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(124,58,237,' + (0.3 * (1 - md / 180)) + ')';
                        ctx.moveTo(pts[i].x, pts[i].y);
                        ctx.lineTo(mx, my);
                        ctx.stroke();
                    }
                }
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,212,255,.7)';
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>

</html>
