<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Formation — RECKON 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --violet: #b44dff;
            --pink: #ff2d78;
            --dark: #060b18;
            --glass: rgba(255, 255, 255, .04);
            --border: rgba(0, 212, 255, .15);
            --text: rgba(255, 255, 255, .9);
            --dim: rgba(255, 255, 255, .45);
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: #00d4ff;
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 150px) scale(1.2);
            }
        }

        .bg-grid {
            position: absolute;
            inset: 0;
            background-size: 40px 40px;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4vw;
            height: 68px;
            background: rgba(6, 11, 24, .9);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(0, 212, 255, .1);
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 15px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-link {
            color: var(--dim);
            text-decoration: none;
            font-family: 'Rajdhani';
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--cyan);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 4vw;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(24px, 5vw, 42px);
            color: var(--cyan);
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--dim);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(12px);
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        form input,
        form textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-family: 'Exo 2';
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
        }

        form input:focus,
        form textarea:focus {
            border-color: var(--cyan);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn.primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .seekers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .hacker-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .hacker-card:hover {
            transform: translateY(-5px);
            border-color: var(--cyan);
            background: rgba(255, 255, 255, 0.04);
        }

        .hacker-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--cyan);
        }

        .h-name {
            font-family: 'Orbitron';
            font-size: 16px;
            color: #fff;
            margin-bottom: 5px;
        }

        .h-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .skill-tag {
            font-size: 10px;
            font-family: 'Rajdhani';
            font-weight: 700;
            background: rgba(0, 212, 255, 0.1);
            color: var(--cyan);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .h-bio {
            font-size: 13px;
            color: var(--dim);
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .h-links {
            display: flex;
            gap: 15px;
        }

        .h-links a {
            color: var(--cyan);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Rajdhani';
            transition: 0.3s;
        }

        .h-links a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--cyan);
        }
    </style>
</head>

<body>
    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-grid"></div>
    </div>

    <nav>
        <a href="index.html" class="brand">
            <span style="color:var(--cyan)">REC</span> 1.O
        </a>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Team Formation Portal</h1>
            <p>Lone wolf? Don't worry. List your skills and let the best teams scout you, or find other talented hackers
                to build something legendary.</p>
        </div>

        <div class="layout">
            <div class="sidebar">
                <div class="card">
                    <div class="card-title">List Your Profile</div>
                    <form id="seekerForm" onsubmit="submitSeeker(event)">
                        <input type="text" id="name" placeholder="Full Name" required>
                        <input type="email" id="email" placeholder="Email Address" required>
                        <input type="text" id="skills" placeholder="Skills (e.g. React, Python, UI/UX)" required>
                        <textarea id="bio" placeholder="Short bio or what you're looking for..." rows="4"
                            required></textarea>
                        <input type="url" id="linkedin" placeholder="LinkedIn Profile (Optional)">
                        <input type="url" id="github" placeholder="GitHub Profile (Optional)">
                        <button type="submit" class="btn primary">Post Proficiency</button>
                    </form>
                </div>
            </div>

            <div class="main">
                <div class="seekers-grid" id="seekersGrid">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadSeekers() {
            try {
                const res = await fetch('/api/seekers');
                const seekers = await res.json();
                const grid = document.getElementById('seekersGrid');
                grid.innerHTML = seekers.map(s => `
                    <div class="hacker-card">
                        <div class="h-name">${s.name}</div>
                        <div class="h-skills">
                            ${s.skills.split(',').map(skill => `<span class="skill-tag">${skill.trim()}</span>`).join('')}
                        </div>
                        <div class="h-bio">${s.bio}</div>
                        <div class="h-links">
                            ${s.linkedin ? `<a href="${s.linkedin}" target="_blank">LINKEDIN</a>` : ''}
                            ${s.github ? `<a href="${s.github}" target="_blank">GITHUB</a>` : ''}
                            <a href="mailto:${s.email}">CONTACT</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function submitSeeker(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                skills: document.getElementById('skills').value,
                bio: document.getElementById('bio').value,
                linkedin: document.getElementById('linkedin').value,
                github: document.getElementById('github').value
            };

            try {
                const res = await fetch('/api/seekers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('Profile posted successfully!');
                    document.getElementById('seekerForm').reset();
                    loadSeekers();
                }
            } catch (e) { alert('Error posting profile'); }
        }

        loadSeekers();
    </script>
</body>

</html>
