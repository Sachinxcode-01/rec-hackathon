<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard | REC 1.O</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <style>
        :root {
            --bg: #060b18;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --cyan: #00d4ff;
            --purple: #7c3aed;
            --pink: #ff2d78;
            --dim: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            background: rgba(6, 11, 24, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links a {
            color: var(--dim);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            margin-left: 20px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--cyan);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }

        .header-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .header-title h1 {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            color: transparent;
            background: linear-gradient(135deg, #fff, var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header-title p {
            color: var(--dim);
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* Podium Layout */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 80px;
            min-height: 300px;
        }

        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
            text-align: center;
        }

        .podium-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        .rank-2 .podium-glass {
            height: 180px;
            border-top: 2px solid silver;
            background: linear-gradient(0deg, rgba(192, 192, 192, 0.05), transparent);
        }

        .rank-1 .podium-glass {
            height: 260px;
            border-top: 2px solid gold;
            background: linear-gradient(0deg, rgba(255, 215, 0, 0.08), transparent);
            box-shadow: 0 -10px 40px rgba(255, 215, 0, 0.15);
        }

        .rank-3 .podium-glass {
            height: 130px;
            border-top: 2px solid #cd7f32;
            background: linear-gradient(0deg, rgba(205, 127, 50, 0.05), transparent);
        }

        .medal {
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .podium-title {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .podium-team {
            color: var(--dim);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .podium-score {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--cyan);
        }

        /* Full Ranking Table */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            margin-bottom: 60px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 18px 25px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
            background: rgba(0, 0, 0, 0.2);
        }

        td {
            font-size: 15px;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: #fff;
        }

        .score-pill {
            background: rgba(0, 212, 255, 0.1);
            color: var(--cyan);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
        }

        /* Peoples choice */
        .peoples-choice {
            background: linear-gradient(135deg, rgba(255, 45, 120, 0.1), rgba(124, 58, 237, 0.1));
            border: 1px solid rgba(255, 45, 120, 0.3);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .peoples-choice::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(ff, 2d, 78, 0.1) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .pc-content {
            position: relative;
            z-index: 1;
        }

        /* Background Canvas */
        #constellation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="brand">
            <img src="logo.jpg" style="height:32px; border-radius:50%;" alt="Logo">
            REC 1.O
        </a>
        <div class="nav-links">
            <a href="gallery.html">Project Gallery</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <canvas id="constellation"></canvas>

    <div class="container">
        <div class="header-title">
            <h1>🏆 Live Leaderboard</h1>
            <p>Real-time technical judging results for REC 1.O Hackathon</p>
        </div>

        <div class="podium-container" id="podiumContainer">
            <!-- Populated via JS -->
            <div style="color:var(--dim); font-size:14px;">Loading podium...</div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">Rank</th>
                        <th>Project Idea</th>
                        <th>Team Name</th>
                        <th style="text-align: right;">Total Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Populated via JS -->
                    <tr>
                        <td colspan="4" style="text-align:center;color:var(--dim);">Loading scores...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="peoples-choice" id="peoplesChoice">
            <!-- Populated via JS -->
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/projects')
                .then(r => r.json())
                .then(projects => {
                    // Calculate total score and sort by it
                    let ranked = projects.map(p => {
                        const score = (p.innovation_score || 0) + (p.ui_score || 0) + (p.tech_score || 0);
                        return { ...p, total_score: score };
                    });

                    // Sort by total score descending
                    ranked.sort((a, b) => b.total_score - a.total_score);

                    const podiumContainer = document.getElementById('podiumContainer');
                    const leaderboardBody = document.getElementById('leaderboardBody');

                    if (ranked.length === 0) {
                        podiumContainer.innerHTML = '';
                        leaderboardBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--dim);">No projects judged yet.</td></tr>';
                        return;
                    }

                    // Render Podium (Order: Rank 2, Rank 1, Rank 3)
                    const top3 = ranked.slice(0, 3);

                    const renderPodiumItem = (p, rankCode, titlePref, medal) => {
                        if (!p) return `<div class="podium-item"></div>`;
                        return `
                        <div class="podium-item rank-${rankCode}">
                            <div class="podium-glass">
                                <div class="medal">${medal}</div>
                                <div class="podium-title">${p.project_title}</div>
                                <div class="podium-team">By ${p.team_name}</div>
                                <div class="podium-score">${p.total_score} <span style="font-size:12px;color:var(--dim);">pts</span></div>
                            </div>
                        </div>`;
                    };

                    podiumContainer.innerHTML =
                        renderPodiumItem(top3[1], 2, '2nd Place', '🥈') +
                        renderPodiumItem(top3[0], 1, 'Winner', '🏆') +
                        renderPodiumItem(top3[2], 3, '3rd Place', '🥉');

                    // Render Table (Rank 4 onwards)
                    leaderboardBody.innerHTML = ranked.map((p, index) => {
                        return `
                        <tr>
                            <td>
                                <div class="rank-badge">${index + 1}</div>
                            </td>
                            <td>
                                <strong style="color:var(--cyan); font-family:'Orbitron', monospace; font-size:14px;">${p.project_title}</strong>
                                <div style="font-size:12px; color:var(--dim); margin-top:4px;">${p.project_desc || ''}</div>
                            </td>
                            <td>${p.team_name}</td>
                            <td style="text-align: right;">
                                <span class="score-pill">${p.total_score} / 30</span>
                            </td>
                        </tr>`;
                    }).join('');

                    // Render People's Choice
                    let popular = [...projects].sort((a, b) => (b.upvotes || 0) - (a.upvotes || 0));
                    if (popular.length > 0 && popular[0].upvotes > 0) {
                        const pc = popular[0];
                        document.getElementById('peoplesChoice').innerHTML = `
                            <div class="pc-content">
                                <h3 style="font-family:'Orbitron'; color:var(--pink); font-size:14px; letter-spacing:2px; text-transform:uppercase; margin-bottom:15px;">💖 People's Choice Award</h3>
                                <h2 style="font-size:32px; margin-bottom:10px;">${pc.project_title}</h2>
                                <p style="color:var(--dim); margin-bottom:20px;">Built by <span style="color:#fff; font-weight:600;">${pc.team_name}</span></p>
                                <div style="display:inline-block; background:rgba(255,255,255,0.05); padding:10px 20px; border-radius:30px; border:1px solid rgba(255,255,255,0.1); font-family:'Orbitron'; color:#fff;">
                                    🔥 ${pc.upvotes} Upvotes
                                </div>
                            </div>
                        `;
                    } else {
                        document.getElementById('peoplesChoice').style.display = 'none';
                    }
                });
        });

        // Realtime Updates
        const socket = io();
        socket.on('leaderboard_update', () => {
            console.log('Realtime Leaderboard Update Received');
            // Simply trigger the fetch again
            document.dispatchEvent(new Event('DOMContentLoaded'));
        });

        // Background Animation
        (function () {
            var c = document.getElementById('constellation'), ctx = c.getContext('2d'), W, H, pts = [];
            function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
            resize(); window.addEventListener('resize', function () { resize(); init(); });
            function init() {
                pts = [];
                var n = Math.floor(W * H / 18000);
                for (var i = 0; i < n; i++) pts.push({ x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25, r: Math.random() * 1.5 + .5 });
            }
            init();

            var mx = W / 2, my = H / 2;
            c.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; });

            function draw() {
                ctx.clearRect(0, 0, W, H);
                for (var i = 0; i < pts.length; i++) {
                    for (var j = i + 1; j < pts.length; j++) {
                        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
                        if (d < 140) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(0,212,255,' + (0.15 * (1 - d / 140)) + ')';
                            ctx.lineWidth = .6;
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.stroke();
                        }
                    }
                    var mdx = pts[i].x - mx, mdy = pts[i].y - my, md = Math.sqrt(mdx * mdx + mdy * mdy);
                    if (md < 180) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(124,58,237,' + (0.3 * (1 - md / 180)) + ')';
                        ctx.moveTo(pts[i].x, pts[i].y);
                        ctx.lineTo(mx, my);
                        ctx.stroke();
                    }
                }
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,212,255,.7)';
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > W) p.vx *= -1;
                    if (p.y < 0 || p.y > H) p.vy *= -1;
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>

</html>
