<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentors — RECKON 1.O</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --blue: #00d4ff;
            --cyan: #00fff7;
            --purple: #7c3aed;
            --violet: #b44dff;
            --pink: #ff2d78;
            --dark: #060b18;
            --glass: rgba(255, 255, 255, .04);
            --border: rgba(0, 212, 255, .15);
            --text: rgba(255, 255, 255, .9);
            --dim: rgba(255, 255, 255, .45);
        }

        body {
            background: #030712;
            font-family: 'Exo 2', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: floatOrb 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #b44dff;
            top: -100px;
            left: -100px;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(150px, 100px) scale(1.3);
            }
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4vw;
            height: 68px;
            background: rgba(6, 11, 24, .9);
            backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(0, 212, 255, .1);
        }

        .brand {
            font-family: 'Orbitron', monospace;
            font-size: 15px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-link {
            color: var(--dim);
            text-decoration: none;
            font-family: 'Rajdhani';
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--cyan);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 4vw;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(24px, 5vw, 42px);
            color: var(--pink);
            text-shadow: 0 0 30px rgba(255, 45, 120, 0.4);
            margin-bottom: 10px;
        }

        .header p {
            color: var(--dim);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .mentors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .mentor-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(12px);
            transition: 0.3s;
            text-align: center;
        }

        .mentor-card:hover {
            transform: scale(1.05);
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .m-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            border: 3px solid var(--pink);
            box-shadow: 0 0 20px rgba(255, 45, 120, 0.3);
        }

        .m-name {
            font-family: 'Orbitron';
            font-size: 18px;
            color: #fff;
            margin-bottom: 5px;
        }

        .m-expertise {
            font-family: 'Rajdhani';
            font-size: 12px;
            font-weight: 700;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .m-bio {
            font-size: 13px;
            color: var(--dim);
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .ping-btn {
            width: 100%;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--cyan);
            font-family: 'Orbitron';
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ping-btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 15px var(--cyan);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #060b18;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            margin-bottom: 15px;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--cyan);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-grid"></div>
    </div>

    <nav>
        <a href="index.html" class="brand">
            <span style="color:var(--pink)">REC</span> 1.O
        </a>
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Mentor Marketplace</h1>
            <p>Stuck on a bug? Need a second pair of eyes on your UI? Our experts are here to guide you. Feel free to
                ping them directly.</p>
        </div>

        <div id="mentorsGrid" class="mentors-grid">
            <!-- Loaded -->
        </div>
    </div>

    <!-- PING MODAL -->
    <div id="pingModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="font-family:'Orbitron'; color:var(--cyan); margin-bottom: 20px;">Ping Mentor</h2>
            <p style="font-size: 13px; color: var(--dim); margin-bottom: 20px;">Submit your desk location and topic to
                alert the mentor.</p>
            <form id="pingForm" onsubmit="submitPing(event)">
                <input type="hidden" id="mentorName">
                <input type="text" id="teamId" class="form-input" placeholder="Your Team ID (e.g. REC1-ABC123)"
                    required>
                <input type="text" id="location" class="form-input" placeholder="Your Desk Location / Area" required>
                <input type="text" id="topic" class="form-input" placeholder="What do you need help with?" required>
                <div style="display:flex; gap:10px;">
                    <button type="button" class="form-input" style="flex:1;" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="submit-btn" style="flex:2;">Alert Mentor</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function loadMentors() {
            try {
                const res = await fetch('/api/mentors');
                const mentors = await res.json();
                const grid = document.getElementById('mentorsGrid');
                grid.innerHTML = mentors.map(m => `
                    <div class="mentor-card">
                        <img src="${m.avatar_url || 'logo.jpg'}" class="m-avatar" alt="${m.name}">
                        <div class="m-name">${m.name}</div>
                        <div class="m-expertise">${m.expertise}</div>
                        <div class="m-bio">${m.bio}</div>
                        <button class="ping-btn" onclick="openPing('${m.name}')">Ping ${m.name}</button>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function openPing(name) {
            document.getElementById('mentorName').value = name;
            document.getElementById('modalTitle').innerText = "Ping " + name;
            document.getElementById('pingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('pingModal').style.display = 'none';
        }

        async function submitPing(e) {
            e.preventDefault();
            const mentorName = document.getElementById('mentorName').value;
            const data = {
                teamId: document.getElementById('teamId').value,
                location: document.getElementById('location').value,
                topic: `PING MENTOR (${mentorName}): ` + document.getElementById('topic').value
            };

            try {
                const res = await fetch('/api/help', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('Mentor has been alerted! They will reach out shortly.');
                    closeModal();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (e) { alert('Network error alerting mentor'); }
        }

        loadMentors();
    </script>
</body>

</html>
